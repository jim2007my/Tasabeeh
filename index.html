<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسابيحاتي - تجربة احترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #c5a059;
            --dark-gold: #a68549;
            --light-gold: #f4e8cf;
            --bg-color: #fdfbf1;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #2d3436;
            --shadow: 0 10px 30px rgba(197, 160, 89, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #fdfbf1, #f5efdb);
            min-height: 100vh;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            overflow-y: auto; /* تم حل مشكلة الثبات هنا */
        }

        /* --- Header --- */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(253, 251, 241, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }

        .logo-area {
            font-weight: 900;
            font-size: 1.4rem;
            color: var(--primary-gold);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-btn {
            font-size: 1.8rem;
            background: none; border: none;
            color: var(--primary-gold);
            cursor: pointer;
        }

        .top-select {
            background: var(--white);
            padding: 8px 15px;
            border-radius: 15px;
            border: 2px solid var(--light-gold);
            font-size: 0.9rem;
            font-weight: 700;
            outline: none;
            cursor: pointer;
        }

        /* --- Main Content --- */
        .main-container {
            flex: 1;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        .zikr-card {
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 30px 20px;
            border-radius: 30px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.5);
            margin-bottom: 50px; /* مسافة كافية بين النص والزر */
        }

        .zikr-card h2 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--dark-gold);
            line-height: 1.4;
        }

        /* --- Counter --- */
        .counter-wrapper {
            position: relative;
            margin-bottom: 40px;
        }

        .counter-circle {
            width: 260px;
            height: 260px;
            background: linear-gradient(145deg, var(--primary-gold), var(--dark-gold));
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 20px 40px rgba(197, 160, 89, 0.4), 
                        inset 0 -8px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            border: 10px solid rgba(255,255,255,0.2);
            transition: all 0.1s ease;
        }

        .counter-circle:active {
            transform: scale(0.92);
            box-shadow: 0 10px 20px rgba(197, 160, 89, 0.3);
        }

        #counter {
            font-size: 5rem;
            font-weight: 900;
            line-height: 1;
        }

        .counter-label {
            font-size: 1rem;
            opacity: 0.8;
            font-weight: 600;
            margin-top: 5px;
        }

        .actions {
            display: flex;
            gap: 20px;
            width: 100%;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border-radius: 20px;
            border: none;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:active { transform: scale(0.95); }
        .btn-undo { background: #54a0ff; }
        .btn-reset { background: #ff6b6b; }

        /* --- Sidebar (التحسين المطلوب) --- */
        .sidebar {
            position: fixed; top: 0; right: -100%; /* غيرت الإتجاه لليمين لأنه RTL أصح */
            width: 85%; max-width: 320px; height: 100%;
            background: white; z-index: 1100;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
            overflow-y: auto; /* جعلت القائمة بالكامل قابلة للتمرير */
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }
        
        .sidebar.active { right: 0; }

        .sidebar-header {
            background: linear-gradient(45deg, var(--primary-gold), var(--dark-gold));
            padding: 50px 20px; color: white; text-align: center;
        }

        .sidebar-content { padding: 25px; }

        .menu-card {
            background: #f8f9fa; 
            padding: 18px; border-radius: 20px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 15px; cursor: pointer;
            border: 1px solid #eee;
        }

        .icon-box {
            width: 45px; height: 45px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: white; margin-left: 15px; font-size: 1.2rem;
        }

        /* --- FAB --- */
        .fab {
            position: fixed; bottom: 30px; left: 30px;
            background: var(--dark-gold);
            color: white; padding: 12px 25px;
            border-radius: 50px; font-weight: 700;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            cursor: pointer; z-index: 90;
            display: flex; align-items: center; gap: 10px;
        }

        /* --- Modal --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            display: none; align-items: center; justify-content: center;
            z-index: 2000; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-card {
            background: white; width: 100%; max-width: 380px;
            border-radius: 30px; padding: 30px; text-align: center;
        }
        .modal-input {
            width: 100%; padding: 15px; border-radius: 15px;
            border: 2px solid #eee; margin: 20px 0; font-size: 1rem;
            text-align: center; outline: none;
        }

        .overlay-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); display: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="overlay-bg" id="overlay" onclick="toggleMenu()"></div>

    <div class="modal-overlay" id="customModal">
        <div class="modal-card">
            <h3 id="modalTitle">إضافة تسبيحة</h3>
            <div id="inputContainer">
                <input type="text" id="modalInput" class="modal-input" placeholder="مثلاً: لا حول ولا قوة إلا بالله">
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-undo" id="modalConfirmBtn" style="flex:2">حفظ</button>
                <button class="btn" onclick="closeModal()" style="background:#eee; color:#333; flex:1">إلغاء</button>
            </div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div style="font-size: 3rem; margin-bottom: 10px;">🌿</div>
            <h2 style="letter-spacing: 1px;">تسابيحاتي</h2>
            <p style="font-size: 0.9rem; opacity: 0.9;">أذكار اليوم والليلة</p>
        </div>
        <div class="sidebar-content">
            <p style="color: #999; font-size: 0.8rem; font-weight: 800; margin-bottom: 15px;">الخدمات</p>
            <div class="menu-card"><div style="display:flex;align-items:center;"><div class="icon-box" style="background:#7d5a5a">📖</div><span>القرآن الكريم</span></div><span>❯</span></div>
            <div class="menu-card"><div style="display:flex;align-items:center;"><div class="icon-box" style="background:#55a363">📿</div><span>حصن المسلم</span></div><span>❯</span></div>
            <div class="menu-card"><div style="display:flex;align-items:center;"><div class="icon-box" style="background:#2a9d8f">🕌</div><span>مواقيت الصلاة</span></div><span>❯</span></div>
            <div class="menu-card"><div style="display:flex;align-items:center;"><div class="icon-box" style="background:#e9c46a">✨</div><span>فضل الذكر</span></div><span>❯</span></div>
            <div style="height: 50px;"></div> </div>
    </div>

    <header>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <div class="logo-area">تسابيحاتي</div>
        <select class="top-select" id="zikrSelect" onchange="changeZikr()">
            <option value="سبحان الله">سبحان الله</option>
            <option value="الحمد لله">الحمد لله</option>
            <option value="الله أكبر">الله أكبر</option>
            <option value="أستغفر الله">أستغفر الله</option>
        </select>
    </header>

    <div class="main-container">
        <div class="zikr-card">
            <h2 id="currentZikr">سبحان الله</h2>
        </div>

        <div class="counter-wrapper">
            <div class="counter-circle" onclick="increment()">
                <span id="counter">0</span>
                <span class="counter-label">نقرة</span>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-undo" onclick="decrement()">↩ تراجع</button>
            <button class="btn btn-reset" onclick="resetCounter()">↻ تصفير</button>
        </div>
    </div>

    <div class="fab" onclick="promptNewZikr()">
        <span style="font-size: 1.5rem;">+</span> أضف ذكراً جديداً
    </div>

    <script>
        let allCounts = JSON.parse(localStorage.getItem('allCounts')) || {};
        let customZikrs = JSON.parse(localStorage.getItem('customZikrs')) || [];

        const counterText = document.getElementById('counter');
        const zikrSelect = document.getElementById('zikrSelect');
        const currentZikrTitle = document.getElementById('currentZikr');
        const customModal = document.getElementById('customModal');
        const modalInput = document.getElementById('modalInput');
        const modalTitle = document.getElementById('modalTitle');
        const modalConfirmBtn = document.getElementById('modalConfirmBtn');

        function init() {
            customZikrs.forEach(z => {
                let opt = document.createElement('option');
                opt.value = z; opt.text = z;
                zikrSelect.add(opt);
            });
            updateUI();
        }

        function updateUI() {
            let selectedZikr = zikrSelect.value;
            currentZikrTitle.innerText = selectedZikr;
            let currentCount = allCounts[selectedZikr] || 0;
            counterText.innerText = currentCount;
            localStorage.setItem('allCounts', JSON.stringify(allCounts));
        }

        function changeZikr() {
            updateUI();
        }

        function increment() {
            let selectedZikr = zikrSelect.value;
            allCounts[selectedZikr] = (allCounts[selectedZikr] || 0) + 1;
            
            // اهتزاز بسيط لو مدعوم في المتصفح
            if (navigator.vibrate) navigator.vibrate(50);
            
            updateUI();
        }

        function decrement() {
            let selectedZikr = zikrSelect.value;
            if (allCounts[selectedZikr] > 0) {
                allCounts[selectedZikr]--;
                updateUI();
            }
        }

        function resetCounter() {
            openModal(`تصفير عداد "${zikrSelect.value}"؟`, false, () => {
                allCounts[zikrSelect.value] = 0;
                updateUI();
            });
        }

        function openModal(title, showInput, onConfirm) {
            modalTitle.innerText = title;
            modalInput.value = "";
            document.getElementById('inputContainer').style.display = showInput ? 'block' : 'none';
            customModal.classList.add('active');
            
            modalConfirmBtn.onclick = () => {
                onConfirm(modalInput.value);
                closeModal();
            };
        }

        function closeModal() { customModal.classList.remove('active'); }

        function promptNewZikr() {
            openModal("أضف ذكراً خاصاً بك", true, (val) => {
                if (val && val.trim() !== "") {
                    let name = val.trim();
                    if (!customZikrs.includes(name)) {
                        customZikrs.push(name);
                        localStorage.setItem('customZikrs', JSON.stringify(customZikrs));
                        let opt = document.createElement('option');
                        opt.value = name; opt.text = name;
                        zikrSelect.add(opt);
                    }
                    zikrSelect.value = name;
                    updateUI();
                }
            });
        }

        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('active');
            overlay.style.display = sidebar.classList.contains('active') ? 'block' : 'none';
        }

        init();
    </script>
</body>
</html>
