<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>تسابيحاتي - تجربة احترافية</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>

:root{
--primary-gold:#c5a059;
--dark-gold:#a68549;
--light-gold:#f4e8cf;
--bg-color:#fdfbf1;
--card-bg:rgba(255,255,255,0.85);
--text-main:#2d3436;
--shadow:0 10px 30px rgba(197,160,89,0.2);
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Cairo',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background-color:var(--bg-color);
background-image:radial-gradient(circle at top right,#fdfbf1,#f5efdb);
min-height:100vh;
color:var(--text-main);
display:flex;
flex-direction:column;
overflow-x:hidden;
}

/* HEADER */

header{
position:sticky;
top:0;
z-index:100;
background:rgba(253,251,241,0.9);
backdrop-filter:blur(10px);
padding:15px 20px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 2px 15px rgba(0,0,0,0.05);
}

.logo-area{
font-weight:900;
font-size:1.4rem;
color:var(--primary-gold);
display:flex;
align-items:center;
gap:10px;
}

.menu-btn{
font-size:1.8rem;
background:none;
border:none;
color:var(--primary-gold);
cursor:pointer;
}

.top-select{
background:white;
padding:8px 15px;
border-radius:15px;
border:2px solid var(--light-gold);
font-size:0.9rem;
font-weight:700;
outline:none;
cursor:pointer;
}

/* MAIN */

.main-container{
flex:1;
padding:40px 20px;
display:flex;
flex-direction:column;
align-items:center;
max-width:500px;
margin:auto;
width:100%;
}

.zikr-card{
width:100%;
background:var(--card-bg);
backdrop-filter:blur(10px);
padding:30px 20px;
border-radius:30px;
text-align:center;
box-shadow:var(--shadow);
border:1px solid rgba(255,255,255,0.5);
margin-bottom:50px;
}

.zikr-card h2{
font-size:1.8rem;
font-weight:800;
color:var(--dark-gold);
}

/* COUNTER */

.counter-wrapper{
margin-bottom:40px;
}

.counter-circle{
width:260px;
height:260px;
background:linear-gradient(145deg,var(--primary-gold),var(--dark-gold));
border-radius:50%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
box-shadow:0 20px 40px rgba(197,160,89,0.4),
inset 0 -8px 15px rgba(0,0,0,0.1);
cursor:pointer;
border:10px solid rgba(255,255,255,0.2);
transition:all .15s;
}

.counter-circle:active{
transform:scale(.9);
}

#counter{
font-size:5rem;
font-weight:900;
}

.counter-label{
opacity:.8;
font-weight:600;
}

.actions{
display:flex;
gap:20px;
width:100%;
}

.btn{
flex:1;
padding:15px;
border-radius:20px;
border:none;
color:white;
font-weight:700;
font-size:1rem;
cursor:pointer;
transition:.2s;
}

.btn:active{transform:scale(.95)}

.btn-undo{background:#54a0ff}
.btn-reset{background:#ff6b6b}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
right:-100%;
width:85%;
max-width:320px;
height:100%;
background:white;
z-index:1100;
transition:.4s;
display:flex;
flex-direction:column;
overflow-y:auto;
box-shadow:-10px 0 30px rgba(0,0,0,0.1);
}

.sidebar.active{
right:0;
}

.sidebar-header{
background:linear-gradient(45deg,var(--primary-gold),var(--dark-gold));
padding:50px 20px;
color:white;
text-align:center;
}

.sidebar-content{
padding:20px;
}

.section-title{
color:var(--primary-gold);
font-size:.85rem;
font-weight:800;
margin:20px 0 10px;
padding-right:10px;
border-right:3px solid var(--primary-gold);
}

.menu-card{
background:#fff;
padding:15px;
border-radius:16px;
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:12px;
cursor:pointer;
border:1px solid #f0f0f0;
transition:.25s;
}

.menu-card:hover{
transform:translateX(-5px);
background:var(--light-gold);
}

.icon-box{
width:40px;
height:40px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
color:white;
margin-left:15px;
font-size:1.1rem;
}

.arrow-icon{
font-size:.8rem;
color:#bbb;
}

/* OVERLAY */

.overlay-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.3);
display:none;
z-index:1000;
}

/* COUNTER EFFECT */

.pop{
animation:pop .2s;
}

@keyframes pop{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

</style>
</head>

<body>

<div class="overlay-bg" id="overlay" onclick="toggleMenu()"></div>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<div class="sidebar-header">
<div style="font-size:3rem;margin-bottom:10px">🌿</div>
<h2>تسابيحاتي</h2>
<p style="font-size:.9rem">رفيقك في ذكر الله</p>
</div>

<div class="sidebar-content">

<div class="section-title">المحتوى الرئيسي</div>

<div class="menu-card"><div style="display:flex;align-items:center"><div class="icon-box" style="background:#7d5a5a">📖</div><span>القرآن الكريم</span></div><span class="arrow-icon">❮</span></div>

<div class="menu-card"><div style="display:flex;align-items:center"><div class="icon-box" style="background:#55a363">📿</div><span>الأذكار</span></div><span class="arrow-icon">❮</span></div>

<div class="menu-card"><div style="display:flex;align-items:center"><div class="icon-box" style="background:#2a9d8f">🕌</div><span>مواقيت الصلاة</span></div><span class="arrow-icon">❮</span></div>

<div class="menu-card"><div style="display:flex;align-items:center"><div class="icon-box" style="background:#f39c12">📅</div><span>التقويم الهجري</span></div><span class="arrow-icon">❮</span></div>

<div class="section-title">الدعم والمعلومات</div>

<div class="menu-card"><div style="display:flex;align-items:center"><div class="icon-box" style="background:#ff6b6b">☕</div><span>ادعم المطور</span></div><span class="arrow-icon">❮</span></div>

<div class="menu-card"><div style="display:flex;align-items:center"><div class="icon-box" style="background:#54a0ff">ℹ️</div><span>من نحن</span></div><span class="arrow-icon">❮</span></div>

</div>
</div>

<header>
<button class="menu-btn" onclick="toggleMenu()">☰</button>
<div class="logo-area">تسابيحاتي</div>

<select class="top-select" id="zikrSelect" onchange="changeZikr()">
<option value="سبحان الله">سبحان الله</option>
<option value="الحمد لله">الحمد لله</option>
<option value="الله أكبر">الله أكبر</option>
<option value="أستغفر الله">أستغفر الله</option>
<option value="لا إله إلا الله">لا إله إلا الله</option>
<option value="اللهم صلِ على محمد">اللهم صلِ على محمد</option>
</select>
</header>

<div class="main-container">

<div class="zikr-card">
<h2 id="currentZikr">سبحان الله</h2>
</div>

<div class="counter-wrapper">

<div class="counter-circle" onclick="increment()" id="circle">

<span id="counter">0</span>
<span class="counter-label">نقرة</span>

</div>

</div>

<div class="actions">
<button class="btn btn-undo" onclick="decrement()">↩ تراجع</button>
<button class="btn btn-reset" onclick="resetCounter()">↻ تصفير</button>
</div>

</div>

<script>

let allCounts = JSON.parse(localStorage.getItem('allCounts')) || {};
let savedZikr = localStorage.getItem("selectedZikr");

const counterText=document.getElementById('counter');
const zikrSelect=document.getElementById('zikrSelect');
const currentZikrTitle=document.getElementById('currentZikr');
const circle=document.getElementById("circle");

if(savedZikr){
zikrSelect.value=savedZikr;
}

function updateUI(){

let selectedZikr=zikrSelect.value;

currentZikrTitle.innerText=selectedZikr;

let currentCount=allCounts[selectedZikr]||0;

counterText.innerText=currentCount;

localStorage.setItem('allCounts',JSON.stringify(allCounts));
localStorage.setItem('selectedZikr',selectedZikr);

}

function changeZikr(){
updateUI();
}

function increment(){

let selectedZikr=zikrSelect.value;

allCounts[selectedZikr]=(allCounts[selectedZikr]||0)+1;

circle.classList.add("pop");

setTimeout(()=>{
circle.classList.remove("pop")
},200);

if(navigator.vibrate){
navigator.vibrate(40);
}

updateUI();
}

function decrement(){

let selectedZikr=zikrSelect.value;

if(allCounts[selectedZikr]>0){

allCounts[selectedZikr]--;

updateUI();

}

}

function resetCounter(){

if(confirm(`هل تريد تصفير عداد "${zikrSelect.value}"؟`)){

allCounts[zikrSelect.value]=0;

updateUI();

}

}

function toggleMenu(){

const sidebar=document.getElementById('sidebar');
const overlay=document.getElementById('overlay');

sidebar.classList.toggle('active');

overlay.style.display=
sidebar.classList.contains('active')
?'block':'none';

}

updateUI();

</script>

</body>
</html>
