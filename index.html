<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسابيحاتي - Tasabeehati</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #c5a059;
            --light-gold: #f4e8cf;
            --bg-gradient: linear-gradient(180deg, #fdfbf1 0%, #f5efdb 100%);
            --white: #ffffff;
            --text-dark: #3d3d3d;
            --accent-blue: #3498db;
            --accent-red: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
        }

        body {
            background: var(--bg-gradient);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* يمنع اهتزاز الصفحة بالكامل */
            color: var(--text-dark);
        }

        /* --- Header --- */
        header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .menu-btn {
            font-size: 1.5rem;
            background: none; border: none;
            color: var(--primary-gold);
            cursor: pointer;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 900;
            font-size: 1.3rem;
        }

        .top-select {
            background: var(--white);
            padding: 5px 12px;
            border-radius: 12px;
            border: 1px solid #eee;
            font-size: 0.9rem;
            font-weight: 700;
            max-width: 130px;
        }

        /* --- Main Card --- */
        .main-container {
            flex: 1;
            padding: 10px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .zikr-card {
            width: 100%;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(197, 160, 89, 0.2);
            padding: 25px;
            border-radius: 25px;
            text-align: center;
        }

        .zikr-card h2 { font-size: 1.8rem; font-weight: 900; min-height: 1.2em; }

        /* --- Counter --- */
        .counter-circle {
            width: clamp(200px, 55vw, 280px);
            height: clamp(200px, 55vw, 280px);
            background: var(--primary-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            font-weight: 900;
            color: var(--text-dark);
            box-shadow: 0 15px 35px rgba(197, 160, 89, 0.4);
            cursor: pointer;
            border: 8px solid rgba(255,255,255,0.3);
            transition: transform 0.05s ease-out;
            will-change: transform; /* يمنع الاهتزاز */
        }

        .counter-circle:active { transform: scale(0.95); }

        .actions {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
        }

        .btn {
            flex: 1;
            max-width: 140px;
            padding: 12px;
            border-radius: 15px;
            border: none;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-undo { background: var(--accent-blue); }
        .btn-reset { background: var(--accent-red); }

        /* --- Stats Card --- */
        .stats-sheet {
            background: var(--white);
            border-radius: 30px 30px 0 0;
            padding: 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
        }

        .stat-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff9f9;
            padding: 12px 15px;
            border-radius: 15px;
            margin-bottom: 10px;
        }

        .edit-goal { cursor: pointer; font-size: 1.2rem; }

        /* --- Progress --- */
        .progress-box { display: flex; justify-content: center; padding: 10px; }
        .circular-progress { width: 120px; height: 120px; position: relative; }
        svg { width: 120px; height: 120px; transform: rotate(-90deg); }
        circle { fill: none; stroke-width: 10; stroke-linecap: round; }
        .bg-circle { stroke: #eee; }
        .fg-circle {
            stroke: var(--primary-gold);
            stroke-dasharray: 314;
            stroke-dashoffset: 314;
            transition: stroke-dashoffset 0.4s ease;
        }
        .progress-text {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        /* --- FAB --- */
        .fab {
            position: fixed; bottom: 25px; left: 25px;
            background: var(--primary-gold);
            color: var(--text-dark);
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(197, 160, 89, 0.4);
            cursor: pointer; z-index: 99;
        }

        /* --- Sidebar --- */
        .sidebar {
            position: fixed; top: 0; right: -100%;
            width: 85%; max-width: 320px; height: 100%;
            background: var(--white); z-index: 1001;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }
        .sidebar.active { right: 0; }
        .sidebar-header {
            background: var(--primary-gold);
            padding: 40px 20px; color: white; text-align: center;
        }
        .sidebar-content { padding: 20px; flex: 1; overflow-y: auto; } /* إصلاح التمرير */
        
        .sidebar-title { color: #999; font-size: 0.8rem; font-weight: 700; margin: 15px 0 10px; }
        .menu-card {
            background: #fdfdfd; border: 1px solid #f0f0f0;
            padding: 15px; border-radius: 18px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 10px;
        }
        .icon-box {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; color: white;
            margin-left: 12px;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            display: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div style="font-size: 3rem; margin-bottom: 10px;">🌿</div>
            <h2>تسابيحاتي</h2>
        </div>
        <div class="sidebar-content">
            <div class="sidebar-title">المحتوى الرئيسي</div>
            <div class="menu-card">
                <div style="display:flex; align-items:center;">
                    <div class="icon-box" style="background:#7d5a5a">📖</div>
                    <span>القرآن الكريم</span>
                </div>
                <span>❯</span>
            </div>
            <div class="menu-card">
                <div style="display:flex; align-items:center;">
                    <div class="icon-box" style="background:#55a363">📿</div>
                    <span>الأذكار</span>
                </div>
                <span>❯</span>
            </div>
            <div class="menu-card">
                <div style="display:flex; align-items:center;">
                    <div class="icon-box" style="background:#2a9d8f">🕌</div>
                    <span>مواقيت الصلاة</span>
                </div>
                <span>❯</span>
            </div>

            <div class="sidebar-title">مميزات التطبيق</div>
            <div class="menu-card">
                <div style="display:flex; align-items:center;">
                    <div class="icon-box" style="background:#f4a261">🏆</div>
                    <span>الإنجازات</span>
                </div>
                <span>❯</span>
            </div>
            <div class="menu-card">
                <div style="display:flex; align-items:center;">
                    <div class="icon-box" style="background:#9b59b6">🎨</div>
                    <span>الثيمات</span>
                </div>
                <span>❯</span>
            </div>
        </div>
    </div>

    <header>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <div class="logo-area">🌿 تسابيحاتي</div>
        <select class="top-select" id="zikrSelect" onchange="updateZikr()">
            <option>سبحان الله</option>
            <option>الحمد لله</option>
            <option>الله أكبر</option>
            <option>استغفر الله</option>
        </select>
    </header>

    <div class="main-container">
        <div class="zikr-card">
            <h2 id="currentZikr">سبحان الله</h2>
        </div>

        <div class="counter-circle" onclick="increment()">
            <span id="counter">0</span>
        </div>

        <div class="actions">
            <button class="btn btn-undo" onclick="decrement()">↩ تراجع</button>
            <button class="btn btn-reset" onclick="reset()">↻ إعادة</button>
        </div>
    </div>


    <div class="fab" onclick="addNewZikr()">
        <span>+</span> أضف تسبيحة
    </div>

    <script>
        // تحميل البيانات من الذاكرة
        let count = parseInt(localStorage.getItem('myCount')) || 0;
        let goal = parseInt(localStorage.getItem('myGoal')) || 1000;
        let customZikrs = JSON.parse(localStorage.getItem('customZikrs')) || [];

        const circle = document.getElementById('fgCircle');
        const counterText = document.getElementById('counter');
        const percentText = document.getElementById('percentText');
        const goalLabel = document.getElementById('goalLabel');
        const zikrSelect = document.getElementById('zikrSelect');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        function init() {
            // إضافة الأذكار المخصصة للقائمة
            customZikrs.forEach(z => {
                let opt = document.createElement('option');
                opt.value = z; opt.text = z;
                zikrSelect.add(opt);
            });
            updateUI();
        }

        function updateUI() {
            counterText.innerText = count;
            let percentage = (count / goal) * 100;
            if (percentage > 100) percentage = 100;
            
            percentText.innerText = Math.floor(percentage) + "%";
            goalLabel.innerText = `${count} / ${goal}`;

            let offset = 314 - (percentage / 100) * 314;
            circle.style.strokeDashoffset = offset;
            
            // حفظ البيانات
            localStorage.setItem('myCount', count);
            localStorage.setItem('myGoal', goal);
        }

        function increment() {
            count++;
            if (navigator.vibrate) navigator.vibrate(40);
            updateUI();
        }

        function decrement() {
            if (count > 0) { count--; updateUI(); }
        }

        function reset() {
            if(confirm("هل تريد تصفير العداد؟")) { count = 0; updateUI(); }
        }

        function editGoal() {
            let newGoal = prompt("عدل إجمالي اليوم المطلوب:", goal);
            if (newGoal && !isNaN(newGoal)) {
                goal = parseInt(newGoal);
                updateUI();
            }
        }

        function addNewZikr() {
            let name = prompt("أدخل نص التسبيحة الجديدة:");
            if (name && name.trim() !== "") {
                customZikrs.push(name);
                localStorage.setItem('customZikrs', JSON.stringify(customZikrs));
                let opt = document.createElement('option');
                opt.value = name; opt.text = name;
                zikrSelect.add(opt);
                zikrSelect.value = name;
                updateZikr();
            }
        }

        function updateZikr() {
            document.getElementById('currentZikr').innerText = zikrSelect.value;
        }

        function toggleMenu() {
            sidebar.classList.toggle('active');
            overlay.style.display = sidebar.classList.contains('active') ? 'block' : 'none';
        }

        init();
    </script>
</body>
</html>
