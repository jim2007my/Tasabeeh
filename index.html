<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسابيحاتي - التجربة الملكية</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-gold: #b38b4d;
            --accent-gold: #d4af37;
            --soft-gold: #f1ece0;
            --deep-dark: #1e1e1e;
            --glass-white: rgba(255, 255, 255, 0.95);
            --shadow-premium: 0 15px 35px rgba(0,0,0,0.1);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Cairo', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background: radial-gradient(circle at top right, #ffffff, #fdfbf7, #f4e8cf);
            min-height: 100vh;
            color: var(--deep-dark);
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            line-height: 1.6;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--glass-white);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(179, 139, 77, 0.15);
            box-shadow: 0 4px 30px rgba(0,0,0,0.03);
        }

        .logo-area { 
            font-weight: 900; 
            font-size: 1.3rem; 
            color: var(--primary-gold);
            letter-spacing: -0.5px;
        }

        .menu-btn { 
            font-size: 1.6rem; 
            background: none; 
            border: none; 
            color: var(--primary-gold); 
            cursor: pointer;
            transition: var(--transition);
        }

        .top-select {
            background: white;
            padding: 10px 18px;
            border-radius: 15px;
            border: 1px solid var(--soft-gold);
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--primary-gold);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: var(--transition);
        }

        .top-select:hover { transform: translateY(-2px); border-color: var(--primary-gold); }

        /* Professional Zikr Dropdown */
        .zikr-dropdown {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            width: 280px;
            background: white;
            border-radius: 18px;
            box-shadow: var(--shadow-premium);
            padding: 8px;
            transform: translateY(-10px);
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
            z-index: 2000;
            border: 1px solid rgba(179, 139, 77, 0.1);
            max-height: 350px;
            overflow-y: auto;
        }

        .zikr-dropdown.open { transform: translateY(0); opacity: 1; pointer-events: auto; }

        .zikr-item {
            padding: 12px 15px;
            border-radius: 12px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 4px;
            border-right: 3px solid transparent;
        }

        .zikr-item:hover { background: var(--soft-gold); border-right-color: var(--accent-gold); }
        .zikr-item.selected { background: var(--soft-gold); border-right-color: var(--primary-gold); }

        .zikr-count {
            background: var(--primary-gold);
            color: white;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            animation: fadeInScale 0.8s ease-out;
        }

        .zikr-card h2 { 
            font-size: 2.2rem; 
            font-weight: 900; 
            color: var(--primary-gold); 
            margin-bottom: 40px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.05);
            text-align: center;
        }

        .counter-circle {
            width: 280px; 
            height: 280px; 
            background: white; 
            border-radius: 50%;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            position: relative; 
            border: 15px solid white;
            outline: 2px solid var(--soft-gold);
            box-shadow: 0 30px 60px rgba(179, 139, 77, 0.15), inset 0 0 30px rgba(0,0,0,0.02);
            cursor: pointer; 
            transition: transform 0.1s;
        }

        .counter-circle:active { transform: scale(0.96); }

        #counter { 
            font-size: 5.5rem; 
            font-weight: 900; 
            color: var(--primary-gold); 
            line-height: 1; 
        }

        .counter-label { color:#a4a4a4; font-size:1rem; font-weight:600; margin-top:10px; }

        .actions { display: flex; gap: 20px; margin-top: 50px; }

        .btn-sm {
            padding: 14px 28px; 
            border-radius: 18px; 
            border: none; 
            font-weight: 800; 
            font-size: 0.9rem;
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .btn-undo { background: white; color: #555; border: 1px solid #eee; }
        .btn-reset { background: #fff5f5; color: #e74c3c; }

        .sidebar {
            position: fixed; top: 0; right: -100%; width: 85%; max-width: 320px; height: 100%;
            background: white; z-index: 2100; transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            box-shadow: -20px 0 60px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
        }

        .sidebar.active { right: 0; }

        .sidebar-header { 
            background: linear-gradient(135deg, var(--primary-gold), var(--accent-gold)); 
            padding: 60px 30px; 
            color: white; 
            text-align: center; 
            border-bottom-left-radius: 40px;
        }

        .sidebar-content { padding: 30px 20px; }

        .section-title { color:#ccc; font-size:.8rem; font-weight:800; margin:25px 0 15px; letter-spacing:2px; text-transform: uppercase; }

        .menu-card {
            padding: 16px; 
            border-radius: 18px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            margin-bottom: 12px; 
            cursor: pointer; 
            transition: 0.3s; 
            background: #fdfdfd;
            border: 1px solid #f5f5f5;
        }

        .menu-card:hover { background: var(--soft-gold); transform: translateX(-5px); }

        .icon-box { 
            width: 45px; height: 45px; border-radius: 14px; 
            display: flex; align-items: center; justify-content: center; 
            color: white; margin-left: 15px; font-size: 1.2rem;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .quran-container {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff;
            z-index: 3000; overflow-y: auto; animation: fadeInScale 0.4s ease;
        }

        .quran-header-bar {
            background: var(--glass-white); backdrop-filter: blur(10px);
            padding: 15px 20px; position: sticky; top: 0; display:flex; align-items:center; 
            border-bottom:1px solid #f0f0f0; z-index: 100;
        }

        .surah-card-item {
            background: white; padding: 20px; border-radius: 20px; display:flex; align-items:center; 
            margin-bottom:15px; border: 1px solid #f1f1f1; transition: 0.3s;
        }

        .surah-num-box {
            width: 45px; height: 45px; background: var(--soft-gold); color: var(--primary-gold); 
            border-radius: 12px; display: flex; align-items:center; justify-content:center; 
            font-weight: 900; margin-left: 15px;
        }

        .ayah-text {
            font-family: 'Amiri', serif;
            font-size: 1.6rem;
            line-height: 2.8;
            text-align: justify;
            direction: rtl;
            padding: 30px;
            background: #fdfbf7;
            border-radius: 25px;
            color: #2d3436;
        }

        .search-container { padding: 20px; position: sticky; top: 60px; background: white; z-index: 90; }

        .overlay-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            display: none; z-index: 2050;
        }

        @media (max-width: 480px) {
            .counter-circle { width: 240px; height: 240px; border-width: 10px; }
            #counter { font-size: 4.2rem; }
            .zikr-card h2 { font-size: 1.7rem; }
        }
    </style>
</head>

<body>

<div class="overlay-bg" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div style="font-size:3.5rem;margin-bottom:15px">✨</div>
        <h3 style="font-size:1.5rem">تسابيحاتي</h3>
        <p style="font-size:0.85rem; opacity: 0.9;">بذكر الله تطمئن القلوب</p>
    </div>

    <div class="sidebar-content">
        <div class="section-title">القائمة الرئيسية</div>
        
        <div class="menu-card" onclick="openQuran()">
            <div style="display:flex;align-items:center">
                <div class="icon-box" style="background:linear-gradient(45deg, #8e44ad, #9b59b6)">📖</div>
                <span style="font-size:1rem; font-weight:700">القرآن الكريم</span>
            </div>
        </div>

        <div class="section-title">المطور</div>
        <div class="menu-card">
            <div style="display:flex;align-items:center">
                <div class="icon-box" style="background:linear-gradient(45deg, #e67e22, #f39c12)">☕</div>
                <span style="font-size:0.95rem; font-weight:700">دعم العمل المستقبلي</span>
            </div>
        </div>
    </div>
</div>

<header>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <div class="logo-area">تسابيحاتي</div>

    <div style="position:relative;">
        <div id="zikrToggle" class="top-select" onclick="toggleZikrDropdown()">
            <span id="zikrLabel">سبحان الله</span>
            <span id="chev">▾</span>
        </div>
        <div id="zikrDropdown" class="zikr-dropdown"></div>
    </div>
</header>

<div class="main-container">
    <div class="zikr-card">
        <h2 id="currentZikr">سبحان الله</h2>
    </div>

    <div class="counter-wrapper">
        <div class="counter-circle" onclick="increment()" id="circle">
            <span id="counter">0</span>
            <span class="counter-label">تكرار</span>
        </div>
    </div>

    <div class="actions">
        <button class="btn-sm btn-undo" onclick="decrement()">↩ تراجع</button>
        <button class="btn-sm btn-reset" onclick="resetCounter()">↻ تصفير</button>
    </div>
</div>

<div id="quranContainer" class="quran-container">
    <div class="quran-header-bar">
         <button class="menu-btn" id="quranHeaderBtn" onclick="closeQuran()" style="margin-left:15px">✕</button>
         <h3 id="quranTitle" style="flex:1; font-size: 1.1rem; color: var(--primary-gold); text-align:center; font-weight: 800;">المصحف الشريف</h3>
    </div>
    
    <div class="search-container" id="surahSearchBox">
        <input type="text" id="quranSearch" class="top-select" style="width:100%; height:55px; border-radius:18px;" placeholder="ابحث باسم السورة أو رقمها..." oninput="filterSurahs()">
    </div>

    <div class="search-container" id="ayahSearchBox" style="display:none;">
        <input type="text" id="ayahSearch" class="top-select" style="width:100%; height:55px; border-radius:18px;" placeholder="ابحث في الآيات (بدون تشكيل)..." oninput="filterAyahs()">
    </div>

    <div id="surahList" style="padding: 0 20px 40px;">
        <p style="text-align:center; padding:40px; color:#999;">جاري فتح المصحف...</p>
    </div>

    <div id="surahView" style="display:none; padding:20px;">
        <div id="ayahsContent" class="ayah-text"></div>
        <button class="btn-sm btn-undo" style="margin: 40px auto; width: 200px; justify-content: center;" onclick="showSurahListUI()">العودة للفهرس</button>
    </div>
</div>

<script>
let allCounts = JSON.parse(localStorage.getItem('allCounts')) || {};
let savedZikr = localStorage.getItem("selectedZikr") || "سبحان الله";
const zikrList = ['سبحان الله','الحمد لله','الله أكبر','أستغفر الله','لا إله إلا الله','اللهم صلِ على محمد','سبحان الله وبحمده','سبحان الله العظيم','لا حول ولا قوة إلا بالله'];

const counterText = document.getElementById('counter');
const currentZikrTitle = document.getElementById('currentZikr');
const circle = document.getElementById("circle");
const zikrToggle = document.getElementById('zikrToggle');
const zikrLabel = document.getElementById('zikrLabel');
const zikrDropdown = document.getElementById('zikrDropdown');
const overlay = document.getElementById('overlay');

function init() {
    renderZikrDropdown();
    updateUI();
    document.addEventListener('click', (e) => {
        if (!zikrToggle.contains(e.target) && !zikrDropdown.contains(e.target)) closeZikrDropdown();
    });
}

// وظيفة إزالة التشكيل للبحث
function removeDiacritics(text) {
    return text.replace(/[\u064B-\u065F\u0670]/g, "");
}

function updateUI(){
    currentZikrTitle.innerText = savedZikr;
    zikrLabel.innerText = savedZikr;
    counterText.innerText = allCounts[savedZikr] || 0;
    localStorage.setItem('allCounts', JSON.stringify(allCounts));
    localStorage.setItem('selectedZikr', savedZikr);
    updateDropdownCounts();
}

function renderZikrDropdown(){
    zikrDropdown.innerHTML = '';
    zikrList.forEach(z => {
        const item = document.createElement('div');
        item.className = 'zikr-item' + (z === savedZikr ? ' selected' : '');
        item.innerHTML = `<span style="font-weight:700">${z}</span><span class="zikr-count" id="count-${escapeId(z)}">${allCounts[z] || 0}</span>`;
        item.onclick = () => { savedZikr = z; updateUI(); closeZikrDropdown(); };
        zikrDropdown.appendChild(item);
    });
}

function updateDropdownCounts(){
    zikrList.forEach(z => {
        const el = document.getElementById('count-' + escapeId(z));
        if (el) el.innerText = allCounts[z] || 0;
    });
}

function toggleZikrDropdown(){ zikrDropdown.classList.toggle('open'); }
function closeZikrDropdown(){ zikrDropdown.classList.remove('open'); }
function escapeId(s) { return s.replace(/[^a-z0-9]/gi, '-'); }

function increment(){
    allCounts[savedZikr] = (allCounts[savedZikr] || 0) + 1;
    if(navigator.vibrate) navigator.vibrate(40);
    updateUI();
}

function decrement(){
    if(allCounts[savedZikr] > 0){
        allCounts[savedZikr]--;
        updateUI();
    }
}

function resetCounter(){
    if(confirm(`هل تريد تصفير عداد "${savedZikr}"؟`)){
        allCounts[savedZikr] = 0;
        updateUI();
    }
}

function toggleMenu(){
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('active');
    overlay.style.display = sidebar.classList.contains('active') ? 'block' : 'none';
}

/* QURAN LOGIC */
const quranContainer = document.getElementById('quranContainer');
const surahListDiv = document.getElementById('surahList');
const surahViewDiv = document.getElementById('surahView');
const quranTitle = document.getElementById('quranTitle');
const quranHeaderBtn = document.getElementById('quranHeaderBtn');
let allSurahs = [];
let currentAyahs = [];

async function openQuran() {
    toggleMenu();
    quranContainer.style.display = 'block';
    if(allSurahs.length === 0) await fetchSurahs();
}

function closeQuran() { quranContainer.style.display = 'none'; showSurahListUI(); }

async function fetchSurahs() {
    try {
        const response = await fetch('https://api.alquran.cloud/v1/surah');
        const data = await response.json();
        allSurahs = data.data;
        renderSurahs(allSurahs);
    } catch (e) {
        surahListDiv.innerHTML = '<p>تعذر تحميل المصحف، تأكد من الاتصال.</p>';
    }
}

function renderSurahs(list) {
    surahListDiv.innerHTML = '';
    list.forEach(surah => {
        const card = document.createElement('div');
        card.className = 'surah-card-item';
        card.innerHTML = `<div class="surah-num-box">${surah.number}</div><div style="flex:1"><div style="font-weight:800">${surah.name}</div><div style="font-size:0.7rem; color:#999">${surah.numberOfAyahs} آية - ${surah.revelationType === 'Meccan' ? 'مكية' : 'مدنية'}</div></div><span>❮</span>`;
        card.onclick = () => loadSurah(surah.number, surah.name);
        surahListDiv.appendChild(card);
    });
}

function filterSurahs() {
    const term = removeDiacritics(document.getElementById('quranSearch').value);
    const filtered = allSurahs.filter(s => 
        removeDiacritics(s.name).includes(term) || 
        s.number.toString().includes(term)
    );
    renderSurahs(filtered);
}

async function loadSurah(id, name) {
    quranTitle.innerText = 'جاري التحميل...';
    surahListDiv.style.display = 'none';
    surahViewDiv.style.display = 'block';
    document.getElementById('surahSearchBox').style.display = 'none';
    document.getElementById('ayahSearchBox').style.display = 'block';
    quranHeaderBtn.innerText = '←';
    quranHeaderBtn.onclick = showSurahListUI;

    try {
        const response = await fetch(`https://api.alquran.cloud/v1/surah/${id}/quran-uthmani`);
        const data = await response.json();
        currentAyahs = data.data.ayahs;
        quranTitle.innerText = name;
        displayAyahs(currentAyahs, id);
        quranContainer.scrollTo(0,0);
    } catch (e) {
        document.getElementById('ayahsContent').innerText = 'خطأ في التحميل.';
    }
}

function displayAyahs(ayahs, surahId) {
    let fullText = '';
    // إضافة البسملة كعنوان إلا في الفاتحة والتوبة
    if (surahId != 1 && surahId != 9) {
        fullText += '<div style="text-align:center; color:var(--primary-gold); margin-bottom:30px; font-size:2rem; font-family: Amiri">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>';
    }

    ayahs.forEach(ayah => {
        let txt = ayah.text;
        // إزالة البسملة المكررة من الآية الأولى في المصحف العثماني
        if (surahId != 1 && ayah.numberInSurah === 1) {
            const bismillah = "بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ";
            if (txt.includes(bismillah)) {
                txt = txt.replace(bismillah, "").trim();
            }
        }
        fullText += `${txt} <span style="color:var(--primary-gold); font-family:Cairo; font-size:1.1rem"> ﴿${ayah.numberInSurah}﴾ </span> `;
    });
    document.getElementById('ayahsContent').innerHTML = fullText || '<p style="text-align:center; color:#999">لا توجد نتائج</p>';
}

function filterAyahs() {
    const term = removeDiacritics(document.getElementById('ayahSearch').value);
    const filtered = currentAyahs.filter(a => removeDiacritics(a.text).includes(term));
    // نحصل على رقم السورة من العنوان أو متغير مخزن (هنا نمرر ID الحالي)
    const surahId = allSurahs.find(s => s.name === quranTitle.innerText)?.number;
    displayAyahs(filtered, surahId);
}

function showSurahListUI() {
    surahViewDiv.style.display = 'none';
    surahListDiv.style.display = 'block';
    document.getElementById('surahSearchBox').style.display = 'block';
    document.getElementById('ayahSearchBox').style.display = 'none';
    document.getElementById('ayahSearch').value = '';
    quranTitle.innerText = 'المصحف الشريف';
    quranHeaderBtn.innerText = '✕';
    quranHeaderBtn.onclick = closeQuran;
}

init();
</script>

</body>
</html>
