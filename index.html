<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسبيحات</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-gold: #c59b58;
            --accent-gold: #e2c083;
            --soft-bg: #fdfbf7;
            --deep-dark: #2c2c2c;
            --text-muted: #8b8b8b;
            --glass-white: rgba(255, 255, 255, 0.85);
            --shadow-soft: 0 10px 30px rgba(197, 155, 88, 0.12);
            --shadow-inner: inset 0 0 0 8px rgba(197, 155, 88, 0.05);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Cairo', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background: radial-gradient(circle at top right, #ffffff, var(--soft-bg), #f0e6d2);
            min-height: 100vh;
            color: var(--deep-dark);
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            line-height: 1.6;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); color: var(--accent-gold); }
            100% { transform: scale(1); }
        }

        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--glass-white);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 15px 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(197, 155, 88, 0.15);
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }

        .logo-area { 
            font-weight: 900; 
            font-size: 1.4rem; 
            color: var(--primary-gold);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .top-select {
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(197, 155, 88, 0.3);
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--primary-gold);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: var(--transition);
        }

        .top-select:hover { 
            transform: translateY(-2px); 
            border-color: var(--primary-gold);
            box-shadow: var(--shadow-soft);
        }

        .dropdown-container {
            position: relative;
        }

        .zikr-dropdown {
            position: absolute;
            top: calc(100% + 15px);
            left: 0; /* Aligned to left for RTL */
            width: 300px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            padding: 10px;
            transform: translateY(-15px);
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            z-index: 2000;
            border: 1px solid rgba(197, 155, 88, 0.1);
            max-height: 60vh;
            overflow-y: auto;
        }

        .zikr-dropdown.open { 
            transform: translateY(0); 
            opacity: 1; 
            visibility: visible; 
        }

        /* Scrollbar Styling for Dropdown */
        .zikr-dropdown::-webkit-scrollbar { width: 6px; }
        .zikr-dropdown::-webkit-scrollbar-track { background: transparent; }
        .zikr-dropdown::-webkit-scrollbar-thumb { background: rgba(197, 155, 88, 0.3); border-radius: 10px; }

        .zikr-item {
            padding: 14px 18px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 4px;
            border-right: 4px solid transparent;
        }

        .zikr-item:hover { 
            background: var(--soft-bg); 
            border-right-color: var(--accent-gold); 
        }
        
        .zikr-item.selected { 
            background: rgba(197, 155, 88, 0.05); 
            border-right-color: var(--primary-gold); 
            color: var(--primary-gold);
        }

        .zikr-count {
            background: var(--primary-gold);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 800;
            box-shadow: 0 4px 10px rgba(197, 155, 88, 0.2);
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            animation: fadeInUp 0.6s ease-out;
        }

        .zikr-card h2 { 
            font-size: 2.4rem; 
            font-weight: 900; 
            color: var(--primary-gold); 
            margin-bottom: 50px;
            text-shadow: 0 4px 15px rgba(197, 155, 88, 0.15);
            text-align: center;
        }

        .counter-wrapper {
            position: relative;
        }

        .counter-circle {
            width: 300px; 
            height: 300px; 
            background: white; 
            border-radius: 50%;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            position: relative; 
            box-shadow: var(--shadow-soft), var(--shadow-inner);
            cursor: pointer; 
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
            user-select: none;
        }

        .counter-circle::after {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: 50%;
            border: 2px solid rgba(197, 155, 88, 0.2);
            z-index: -1;
            pointer-events: none;
        }

        .counter-circle:active { 
            transform: scale(0.95); 
            box-shadow: 0 5px 15px rgba(197, 155, 88, 0.1), inset 0 0 0 12px rgba(197, 155, 88, 0.08);
        }

        #counter { 
            font-size: 6rem; 
            font-weight: 900; 
            color: var(--primary-gold); 
            line-height: 1; 
            transition: color 0.2s;
        }

        #counter.animate-pop {
            animation: pop 0.2s ease-out;
        }

        .counter-label { 
            color: var(--text-muted); 
            font-size: 1.1rem; 
            font-weight: 600; 
            margin-top: 5px; 
            letter-spacing: 1px;
        }

        .actions { 
            display: flex; 
            gap: 20px; 
            margin-top: 60px; 
        }

        .btn-sm {
            padding: 14px 28px; 
            border-radius: 50px; 
            border: none; 
            font-weight: 800; 
            font-size: 1rem;
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            transition: var(--transition);
        }

        .btn-undo { 
            background: white; 
            color: var(--text-muted); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
        }
        
        .btn-undo:hover {
            color: var(--deep-dark);
            box-shadow: 0 12px 25px rgba(0,0,0,0.08);
            transform: translateY(-2px);
        }

        .btn-reset { 
            background: #fff5f5; 
            color: #e74c3c; 
            box-shadow: 0 8px 20px rgba(231, 76, 60, 0.1);
        }

        .btn-reset:hover {
            background: #e74c3c;
            color: white;
            box-shadow: 0 12px 25px rgba(231, 76, 60, 0.2);
            transform: translateY(-2px);
        }

        svg {
            width: 20px;
            height: 20px;
        }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            header { padding: 12px 20px; }
            .logo-area { font-size: 1.2rem; }
            .top-select { padding: 8px 16px; font-size: 0.9rem; }
            
            .counter-circle { width: 250px; height: 250px; }
            #counter { font-size: 4.8rem; }
            .zikr-card h2 { font-size: 1.8rem; margin-bottom: 30px; }
            
            .actions { 
                width: 100%; 
                max-width: 320px; 
                flex-direction: column; 
                gap: 15px; 
                margin-top: 40px; 
            }
            .btn-sm { width: 100%; justify-content: center; padding: 16px; }
            
            .zikr-dropdown {
                position: fixed;
                top: auto;
                bottom: 0;
                left: 0;
                right: 0;
                width: 100%;
                border-radius: 30px 30px 0 0;
                transform: translateY(100%);
                padding: 20px;
                max-height: 70vh;
                border: none;
                box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
            }
            .zikr-dropdown.open {
                transform: translateY(0);
            }
            
            /* Overlay for mobile bottom sheet */
            .overlay {
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.4);
                backdrop-filter: blur(3px);
                z-index: 1500;
                opacity: 0;
                visibility: hidden;
                transition: var(--transition);
            }
            .overlay.open { opacity: 1; visibility: visible; }
        }
    </style>
</head>

<body>

<div class="overlay" id="overlay" onclick="closeZikrDropdown()"></div>

<header>
    <div class="logo-area">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        تسبيحات
    </div>

    <div class="dropdown-container">
        <div id="zikrToggle" class="top-select" onclick="toggleZikrDropdown()">
            <span id="zikrLabel">سبحان الله</span>
            <svg id="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </div>
        <div id="zikrDropdown" class="zikr-dropdown">
            <div style="width: 40px; height: 5px; background: #eee; border-radius: 5px; margin: 0 auto 15px auto; display: none;" class="mobile-indicator"></div>
        </div>
    </div>
</header>

<div class="main-container">
    <div class="zikr-card">
        <h2 id="currentZikr">سبحان الله</h2>
    </div>

    <div class="counter-wrapper">
        <div class="counter-circle" onclick="increment()" id="circle">
            <span id="counter">0</span>
            <span class="counter-label">تكرار</span>
        </div>
    </div>

    <div class="actions">
        <button class="btn-sm btn-undo" onclick="decrement()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"/></svg>
            تراجع
        </button>
        <button class="btn-sm btn-reset" onclick="resetCounter()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            تصفير
        </button>
    </div>
</div>

<script>
let allCounts = JSON.parse(localStorage.getItem('allCounts')) || {};
let savedZikr = localStorage.getItem("selectedZikr") || "سبحان الله";
const zikrList = [
    'سبحان الله',
    'الحمد لله',
    'الله أكبر',
    'أستغفر الله',
    'لا إله إلا الله',
    'اللهم صلِ على محمد',
    'سبحان الله وبحمده',
    'سبحان الله العظيم',
    'لا حول ولا قوة إلا بالله'
];

const counterText = document.getElementById('counter');
const currentZikrTitle = document.getElementById('currentZikr');
const circle = document.getElementById("circle");
const zikrToggle = document.getElementById('zikrToggle');
const zikrLabel = document.getElementById('zikrLabel');
const zikrDropdown = document.getElementById('zikrDropdown');
const overlay = document.getElementById('overlay');

// Show indicator line only on mobile
if (window.innerWidth <= 600) {
    document.querySelector('.mobile-indicator').style.display = 'block';
}

function init() {
    renderZikrDropdown();
    updateUI();
    
    // Close dropdown when clicking outside (Desktop)
    document.addEventListener('click', (e) => {
        if (!zikrToggle.contains(e.target) && !zikrDropdown.contains(e.target) && window.innerWidth > 600) {
            closeZikrDropdown();
        }
    });
}

function updateUI(){
    currentZikrTitle.innerText = savedZikr;
    zikrLabel.innerText = savedZikr;
    counterText.innerText = allCounts[savedZikr] || 0;
    
    localStorage.setItem('allCounts', JSON.stringify(allCounts));
    localStorage.setItem('selectedZikr', savedZikr);
    
    updateDropdownCounts();
}

function renderZikrDropdown(){
    // Keep the mobile indicator if it exists
    const indicatorHtml = window.innerWidth <= 600 ? '<div style="width: 40px; height: 5px; background: #eee; border-radius: 5px; margin: 0 auto 15px auto;"></div>' : '';
    zikrDropdown.innerHTML = indicatorHtml;
    
    zikrList.forEach(z => {
        const item = document.createElement('div');
        item.className = 'zikr-item' + (z === savedZikr ? ' selected' : '');
        item.innerHTML = `<span style="font-weight:700; font-size: 1.05rem;">${z}</span><span class="zikr-count" id="count-${escapeId(z)}">${allCounts[z] || 0}</span>`;
        item.onclick = () => { 
            savedZikr = z; 
            updateUI(); 
            closeZikrDropdown(); 
            renderZikrDropdown(); 
        };
        zikrDropdown.appendChild(item);
    });
}

function updateDropdownCounts(){
    zikrList.forEach(z => {
        const el = document.getElementById('count-' + escapeId(z));
        if (el) el.innerText = allCounts[z] || 0;
    });
}

function toggleZikrDropdown(){ 
    zikrDropdown.classList.toggle('open');
    if(window.innerWidth <= 600) {
        overlay.classList.toggle('open');
    }
}

function closeZikrDropdown(){ 
    zikrDropdown.classList.remove('open');
    overlay.classList.remove('open');
}

function escapeId(s) {
    try {
        return btoa(unescape(encodeURIComponent(s))).replace(/=+$/, '').replace(/\+/g,'-').replace(/\//g,'_');
    } catch (e) {
        return s.replace(/\s+/g, '-').replace(/[^\w-]/g, '');
    }
}

function increment(){
    allCounts[savedZikr] = (allCounts[savedZikr] || 0) + 1;
    
    // Animate Number Pop
    counterText.classList.remove('animate-pop');
    void counterText.offsetWidth; // trigger reflow
    counterText.classList.add('animate-pop');

    // Haptic Feedback
    if(navigator.vibrate) navigator.vibrate(30);
    
    updateUI();
}

function decrement(){
    if((allCounts[savedZikr] || 0) > 0){
        allCounts[savedZikr]--;
        updateUI();
    }
}

function resetCounter(){
    if(confirm(`هل أنت متأكد من تصفير عداد "${savedZikr}"؟`)){
        allCounts[savedZikr] = 0;
        updateUI();
        renderZikrDropdown();
    }
}

init();
</script>

</body>
</html>
