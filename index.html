<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسبيحات | تطبيق إسلامي شامل</title>

    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ================= المتغيرات العامة (تصميم نقي وبسيط) ================= */
        :root {
            --primary-gold: #b8860b;
            --light-gold: #fdfaf2;
            --bg-color: #f4f6f9;
            --surface-color: #ffffff;
            --border-color: #e2e8f0;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --sidebar-width: 260px;
            --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.03);
            --transition: all 0.25s ease-in-out;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            overflow-x: hidden;
            display: flex;
            min-height: 100vh;
        }

        /* ================= العناصر الأساسية ================= */
        .card {
            background: var(--surface-color);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-soft);
        }

        /* ================= القائمة الجانبية ================= */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            right: 0;
            top: 0;
            z-index: 2000;
            background: var(--surface-color);
            border-left: 1px solid var(--border-color);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 35px 20px;
            text-align: center;
            border-bottom: 1px solid var(--light-gold);
        }

        .sidebar-logo {
            font-size: 2rem;
            color: var(--primary-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: 'Amiri Quran', serif;
        }

        .sidebar-nav {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item {
            padding: 14px 18px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .nav-item:hover {
            background: var(--bg-color);
            color: var(--text-dark);
        }

        .nav-item.active {
            background: var(--light-gold);
            color: var(--primary-gold);
            border: 1px solid rgba(184, 134, 11, 0.15);
        }

        .nav-item i { font-size: 1.2rem; width: 25px; text-align: center; }

        /* ================= المحتوى الرئيسي ================= */
        .main-content {
            margin-right: var(--sidebar-width);
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: var(--transition);
        }

        .mobile-header {
            display: none;
            width: 100%;
            padding: 15px 20px;
            align-items: center;
            justify-content: space-between;
            background: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1500;
        }

        .menu-toggle { background: none; border: none; font-size: 1.4rem; color: var(--text-dark); cursor: pointer; }

        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4); z-index: 1900; 
            opacity: 0; visibility: hidden; transition: var(--transition);
        }

        .view-section {
            display: none; 
            width: 100%; 
            max-width: 800px; 
            padding: 40px 20px; 
            flex-direction: column; 
            align-items: center; 
            flex: 1;
            animation: fadeIn 0.3s ease;
        }

        .view-section.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 900px) {
            .sidebar { transform: translateX(100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-right: 0; }
            .mobile-header { display: flex; }
            .overlay.open { opacity: 1; visibility: visible; }
            .view-section { padding: 25px 15px; }
        }

        /* ================= قسم التسبيح ================= */
        .tasbeeh-wrapper { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; }
        
        .t-title { font-size: 2.2rem; color: var(--primary-gold); margin-bottom: 30px; text-align: center; font-family: 'Amiri Quran', serif; }
        
        .t-top-select {
            background: var(--surface-color); padding: 12px 24px; border-radius: 30px; border: 1px solid var(--border-color);
            font-size: 1rem; font-weight: 700; color: var(--text-dark);
            display: inline-flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 40px; transition: var(--transition);
        }
        .t-top-select:hover { border-color: var(--primary-gold); color: var(--primary-gold); }
        
        .t-dropdown {
            position: absolute; width: 260px; border-radius: 16px; background: var(--surface-color); border: 1px solid var(--border-color);
            padding: 10px; opacity: 0; visibility: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: var(--transition); z-index: 2000; top: 60px; left: 50%; transform: translateX(-50%) translateY(10px);
            max-height: 300px; overflow-y: auto;
        }
        .t-dropdown.open { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
        
        .t-item { padding: 12px 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; font-weight: 700; color: var(--text-muted); margin-bottom: 4px; }
        .t-item:hover { background: var(--bg-color); color: var(--text-dark); }
        .t-item.selected { background: var(--light-gold); color: var(--primary-gold); }
        
        .t-count-badge { background: var(--bg-color); color: var(--text-muted); padding: 4px 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 800; }
        .t-item.selected .t-count-badge { background: var(--primary-gold); color: white; }

        .add-zikr-btn { justify-content: center; color: var(--primary-gold); gap: 8px; margin-top: 5px; border: 1px dashed var(--primary-gold); }
        .add-zikr-btn:hover { background: var(--primary-gold); color: white; }
        
        /* زر التسبيح النظيف */
        .t-circle {
            width: 240px; height: 240px; border-radius: 50%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer; user-select: none;
            background: var(--surface-color); border: 4px solid var(--light-gold);
            box-shadow: 0 10px 30px rgba(184, 134, 11, 0.1);
            transition: transform 0.1s;
        }
        .t-circle:active { transform: scale(0.95); border-color: var(--primary-gold); background: var(--light-gold); }
        
        .t-number { font-size: 5rem; font-weight: 900; color: var(--text-dark); line-height: 1; font-family: 'Cairo', sans-serif; }
        .t-label { color: var(--text-muted); font-size: 1rem; font-weight: 700; margin-top: 5px;}
        
        .t-actions { display: flex; gap: 15px; margin-top: 40px; width: 100%; }
        .t-btn { flex: 1; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: var(--transition); color: var(--text-muted); background: var(--surface-color); border: 1px solid var(--border-color); }
        .t-btn:hover { color: var(--text-dark); background: var(--bg-color); }
        .t-btn-reset:hover { color: #dc2626; border-color: #fca5a5; background: #fef2f2; }

        /* ================= المصحف ================= */
        .q-wrapper { width: 100%; display: flex; flex-direction: column; align-items: center;}
        #q-list-view { width: 100%; }
        .q-search { width: 100%; padding: 18px 25px; border-radius: 16px; font-size: 1.05rem; font-weight: 600; outline: none; margin-bottom: 25px; transition: 0.2s; color: var(--text-dark); background: var(--surface-color); border: 1px solid var(--border-color); }
        .q-search:focus { border-color: var(--primary-gold); box-shadow: 0 0 0 3px var(--light-gold); }
        
        .q-surah-card { background: var(--surface-color); padding: 18px; border-radius: 16px; border: 1px solid var(--border-color); display: flex; align-items: center; margin-bottom: 12px; cursor: pointer; transition: 0.2s; }
        .q-surah-card:hover { border-color: var(--primary-gold); box-shadow: 0 4px 15px rgba(0,0,0,0.03); transform: translateY(-2px); }
        .q-num { width: 45px; height: 45px; background: var(--light-gold); color: var(--primary-gold); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.1rem; margin-left: 15px; }
        .q-name { font-weight: 800; font-size: 1.2rem; color: var(--text-dark); }
        .q-details { font-size: 0.9rem; color: var(--text-muted); font-weight: 600; margin-top: 3px; }
        
        /* شاشة القراءة */
        .q-reader { display: none; padding: 40px; border-radius: 20px; width: 100%; background: var(--surface-color); border: 1px solid var(--border-color); }
        .q-reader-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); flex-wrap: wrap; gap: 15px; }
        
        .q-btn { background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-dark); padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
        .q-btn:hover { background: var(--light-gold); color: var(--primary-gold); border-color: var(--primary-gold); }
        
        .q-font-controls { display: flex; align-items: center; background: var(--bg-color); border-radius: 12px; padding: 4px; border: 1px solid var(--border-color); }
        .q-font-controls button { background: transparent; border: none; width: 35px; height: 35px; border-radius: 8px; font-size: 1.1rem; color: var(--text-dark); cursor: pointer; transition: 0.2s; }
        .q-font-controls button:hover { background: var(--surface-color); color: var(--primary-gold); }
        .q-font-controls span { margin: 0 10px; color: var(--text-muted); font-size: 1rem;}

        .q-bismillah { text-align: center; color: var(--primary-gold); font-size: 1.4em; font-family: 'Amiri Quran', serif; margin-bottom: 30px; }
        .q-ayahs { font-family: 'Amiri Quran', serif; font-size: 2.2rem; line-height: 2.2; text-align: justify; direction: rtl; color: var(--text-dark); }
        .q-ayah-num { color: var(--primary-gold); font-family: 'Cairo', sans-serif; font-size: 0.55em; font-weight: 800; margin: 0 5px; }

        @media (max-width: 600px) {
            .q-reader { padding: 20px 15px; }
            .q-reader-header { flex-direction: column; align-items: stretch; }
            .q-btn, .q-font-controls { justify-content: center; }
        }

        /* ================= مواقيت الصلاة ================= */
        .prayer-container { width: 100%; border-radius: 20px; padding: 15px; display: flex; justify-content: center; align-items: center; background: var(--surface-color); border: 1px solid var(--border-color); box-shadow: var(--shadow-soft); }
        .prayer-container iframe { width: 100%; height: 275px; border: none; border-radius: 12px; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <i class="fa-solid fa-bahai"></i>
                تسبيحات
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-item active" onclick="switchTab('tasbeeh', this)">
                <i class="fa-solid fa-fingerprint"></i> المُسَبِّحَة
            </div>
            <div class="nav-item" onclick="switchTab('quran', this)">
                <i class="fa-solid fa-book-open"></i> المصحف الشريف
            </div>
            <div class="nav-item" onclick="switchTab('prayer', this)">
                <i class="fa-solid fa-mosque"></i> مواقيت الصلاة
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <div class="mobile-header">
            <h2 id="mobile-title" style="font-size: 1.3rem; font-weight: 800; color: var(--primary-gold);">المُسَبِّحَة</h2>
            <button class="menu-toggle" onclick="toggleMenu()"><i class="fa-solid fa-bars-staggered"></i></button>
        </div>

        <section id="view-tasbeeh" class="view-section active">
            <div class="tasbeeh-wrapper">
                <h2 class="t-title" id="t-current-zikr">سبحان الله</h2>

                <div style="position: relative; width: 100%; display: flex; justify-content: center;">
                    <div class="t-top-select" onclick="document.getElementById('t-dropdown').classList.toggle('open')">
                        <span id="t-label">تغيير الذكر</span>
                        <i class="fa-solid fa-angle-down"></i>
                    </div>
                    <div id="t-dropdown" class="t-dropdown"></div>
                </div>

                <div class="t-circle" onclick="t_increment()" id="t-circle">
                    <span class="t-number" id="t-counter">0</span>
                    <span class="t-label">تسبيحة</span>
                </div>

                <div class="t-actions">
                    <button class="t-btn" onclick="t_decrement()"><i class="fa-solid fa-minus"></i> تراجع</button>
                    <button class="t-btn t-btn-reset" onclick="t_reset()"><i class="fa-solid fa-rotate-left"></i> تصفير</button>
                </div>
            </div>
        </section>

        <section id="view-quran" class="view-section">
            <div class="q-wrapper">
                <div id="q-list-view">
                    <input type="text" id="q-search" class="q-search" placeholder="ابحث باسم السورة أو رقمها..." oninput="q_filterSurahs()">
                    <div id="q-surahs-container">
                        <div style="text-align: center; padding: 40px; color: var(--text-muted); font-weight: 700;">
                            <i class="fa-solid fa-circle-notch fa-spin fa-2x" style="color: var(--primary-gold); margin-bottom: 15px;"></i><br>
                            جاري تحميل السور...
                        </div>
                    </div>
                </div>

                <div id="q-reader-view" class="q-reader">
                    <div class="q-reader-header">
                        <button class="q-btn" onclick="q_showList()"><i class="fa-solid fa-arrow-right"></i> القائمة</button>
                        <div class="q-font-controls">
                            <button onclick="q_changeFontSize(0.2)" title="تكبير الخط"><i class="fa-solid fa-plus"></i></button>
                            <span><i class="fa-solid fa-font"></i></span>
                            <button onclick="q_changeFontSize(-0.2)" title="تصغير الخط"><i class="fa-solid fa-minus"></i></button>
                        </div>
                    </div>
                    
                    <h2 id="q-surah-title" style="text-align: center; color: var(--text-dark); margin-bottom: 25px; font-weight: 800; font-size: 2rem; font-family: 'Amiri Quran', serif;"></h2>
                    <div id="q-ayahs-content" class="q-ayahs"></div>
                </div>
            </div>
        </section>

        <section id="view-prayer" class="view-section">
            <div style="width: 100%; max-width: 500px;">
                <h2 style="text-align: center; color: var(--primary-gold); font-family: 'Amiri Quran', serif; font-size: 2.2rem; margin-bottom: 20px;">مواقيت الصلاة</h2>
                <div class="prayer-container">
<iframe src="https://timesprayer.com/widgets.php?frame=3&amp;lang=ar&amp;name=cairo&amp;fcolor=CFA858&amp;tcolor=63512A&amp;frcolor=E8BC63" style="border: none; overflow: hidden; width: 100%; height: 220px;"></iframe>                </div>
            </div>
        </section>
    </main>

    <script>
        // --- Navigation ---
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }

        function switchTab(tabId, element) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('mobile-title').innerText = element.innerText;
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + tabId).classList.add('active');
            if(window.innerWidth <= 900) toggleMenu();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // --- 1. التسبيح ---
        let t_allCounts = JSON.parse(localStorage.getItem('allCounts')) || {};
        let t_savedZikr = localStorage.getItem("selectedZikr") || "سبحان الله";
        const defaultZikrList = ['سبحان الله', 'الحمد لله', 'الله أكبر', 'أستغفر الله', 'لا إله إلا الله', 'اللهم صلِ على محمد', 'لا حول ولا قوة إلا بالله'];
        let zikrList = JSON.parse(localStorage.getItem('customZikrList')) || defaultZikrList;

        function t_init() { t_renderDropdown(); t_updateUI(); }

        function t_updateUI() {
            document.getElementById('t-current-zikr').innerText = t_savedZikr;
            document.getElementById('t-counter').innerText = t_allCounts[t_savedZikr] || 0;
            localStorage.setItem('allCounts', JSON.stringify(t_allCounts));
            localStorage.setItem('selectedZikr', t_savedZikr);
        }

        function t_renderDropdown() {
            const dd = document.getElementById('t-dropdown'); dd.innerHTML = '';
            zikrList.forEach(z => {
                const item = document.createElement('div');
                item.className = 't-item' + (z === t_savedZikr ? ' selected' : '');
                item.innerHTML = `<span>${z}</span><span class="t-count-badge">${t_allCounts[z] || 0}</span>`;
                item.onclick = () => { t_savedZikr = z; dd.classList.remove('open'); t_init(); };
                dd.appendChild(item);
            });
            const addBtn = document.createElement('div');
            addBtn.className = 't-item add-zikr-btn';
            addBtn.innerHTML = `<i class="fa-solid fa-plus"></i> إضافة ذكر جديد`;
            addBtn.onclick = () => { dd.classList.remove('open'); setTimeout(t_addNewZikr, 100); };
            dd.appendChild(addBtn);
        }

        function t_addNewZikr() {
            const newZikr = prompt("أدخل الذكر الجديد الذي تود إضافته:");
            if(newZikr && newZikr.trim() !== "") {
                const trimmedZikr = newZikr.trim();
                if(!zikrList.includes(trimmedZikr)) {
                    zikrList.push(trimmedZikr);
                    localStorage.setItem('customZikrList', JSON.stringify(zikrList));
                    t_savedZikr = trimmedZikr;
                    t_init();
                } else { alert("هذا الذكر موجود بالفعل في القائمة!"); }
            }
        }

        function t_increment() {
            t_allCounts[t_savedZikr] = (t_allCounts[t_savedZikr] || 0) + 1;
            if(navigator.vibrate) navigator.vibrate(10);
            t_updateUI(); t_renderDropdown();
        }

        function t_decrement() {
            if((t_allCounts[t_savedZikr] || 0) > 0) { t_allCounts[t_savedZikr]--; t_updateUI(); t_renderDropdown(); }
        }

        function t_reset() {
            if(confirm(`هل أنت متأكد من تصفير عداد "${t_savedZikr}"؟`)) { 
                t_allCounts[t_savedZikr] = 0; t_updateUI(); t_renderDropdown(); 
            }
        }

        // --- 2. المصحف ---
        let q_allSurahs = [];
        let q_fontSize = parseFloat(localStorage.getItem('quranFontSize')) || 2.2;

        async function q_init() {
            q_applyFontSize();
            try {
                const res = await fetch('https://api.alquran.cloud/v1/surah');
                q_allSurahs = (await res.json()).data;
                q_renderSurahs(q_allSurahs);
            } catch (e) { 
                document.getElementById('q-surahs-container').innerHTML = '<div style="color:#ef4444; text-align:center; padding: 20px;">تعذر تحميل المصحف. يرجى التحقق من الإنترنت.</div>'; 
            }
        }

        function q_changeFontSize(change) {
            q_fontSize += change;
            if (q_fontSize < 1.5) q_fontSize = 1.5; 
            if (q_fontSize > 4.5) q_fontSize = 4.5; 
            q_applyFontSize();
            localStorage.setItem('quranFontSize', q_fontSize);
        }

        function q_applyFontSize() { document.getElementById('q-ayahs-content').style.fontSize = q_fontSize + 'rem'; }
        function q_toArabic(num) { return num.toString().replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]); }
        function q_removeDiacritics(txt) { return txt ? txt.replace(/[\u064B-\u065F\u0670\u0610-\u061A\u06D6-\u06ED]/g, "") : ''; }

        function q_renderSurahs(list) {
            const container = document.getElementById('q-surahs-container');
            if(!list.length) { container.innerHTML = '<div style="text-align:center; padding:20px;">لا توجد نتائج.</div>'; return; }
            let html = '';
            list.forEach(s => {
                html += `
                <div class="q-surah-card" onclick="q_loadSurah(${s.number}, '${s.name}')">
                    <div class="q-num">${q_toArabic(s.number)}</div>
                    <div style="flex:1;">
                        <div class="q-name">${s.name}</div>
                        <div class="q-details">${q_toArabic(s.numberOfAyahs)} آية - ${s.revelationType === 'Meccan' ? 'مكية' : 'مدنية'}</div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function q_filterSurahs() {
            const term = q_removeDiacritics(document.getElementById('q-search').value);
            q_renderSurahs(q_allSurahs.filter(s => q_removeDiacritics(s.name).includes(term) || s.number.toString().includes(term)));
        }

        async function q_loadSurah(id, name) {
            document.getElementById('q-list-view').style.display = 'none'; 
            document.getElementById('q-reader-view').style.display = 'block';
            document.getElementById('q-surah-title').innerText = 'جاري التحميل...'; 
            document.getElementById('q-ayahs-content').innerHTML = '<div style="text-align:center; padding:40px;"><i class="fa-solid fa-spinner fa-spin fa-2x" style="color:var(--primary-gold)"></i></div>';
            
            try {
                const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}/quran-uthmani`);
                const ayahs = (await res.json()).data.ayahs;
                document.getElementById('q-surah-title').innerText = name;
                q_displayAyahs(ayahs, id);
                window.scrollTo({top: 0, behavior: 'smooth'});
            } catch (e) { 
                document.getElementById('q-ayahs-content').innerHTML = '<div style="color:#ef4444; text-align:center;">حدث خطأ. حاول مرة أخرى.</div>'; 
            }
        }

        function q_displayAyahs(ayahs, surahId) {
            // إضافة البسملة كعنوان علوي لجميع السور عدا الفاتحة (1) والتوبة (9)
            let html = (surahId !== 1 && surahId !== 9) ? `<div class="q-bismillah">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>` : '';
            
            ayahs.forEach(a => {
                let txt = a.text;
                // إزالة البسملة من الآية الأولى إذا كانت موجودة (بالتطابق الدقيق مع مخرجات الـ API)
                if (surahId !== 1 && surahId !== 9 && a.numberInSurah === 1) {
                    txt = txt.replace("بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ ", "");
                }
                html += `${txt} <span class="q-ayah-num">﴿${q_toArabic(a.numberInSurah)}﴾</span> `;
            });
            document.getElementById('q-ayahs-content').innerHTML = html;
        }

        function q_showList() {
            document.getElementById('q-list-view').style.display = 'block'; 
            document.getElementById('q-reader-view').style.display = 'none';
        }

        // --- التهيئة العامة ---
        window.onload = () => {
            t_init(); q_init();
            document.addEventListener('click', (e) => {
                const tDropdown = document.getElementById('t-dropdown');
                if (!e.target.closest('.t-top-select') && !e.target.closest('.t-dropdown') && tDropdown.classList.contains('open')) {
                    tDropdown.classList.remove('open');
                }
            });
        };
    </script>
</body>
</html>
