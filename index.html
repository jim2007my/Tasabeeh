<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>تسابيحاتي - تجربة احترافية موثوقة</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary-gold: #c5a059;
    --dark-gold: #a68549;
    --light-gold: #f4e8cf;
    --bg-color: #f8f9fa;
    --card-bg: #ffffff;
    --text-main: #2d3436;
    --shadow: 0 10px 40px rgba(0,0,0,0.08);
    --accent-blue: #4a90e2;
    --accent-red: #e74c3c;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }

body {
    background-color: var(--bg-color);
    background-image: radial-gradient(circle at top right, #ffffff, #f1ece0);
    min-height: 100vh;
    color: var(--text-main);
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
}

/* HEADER */
header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(12px);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(197, 160, 89, 0.12);
}

.logo-area { font-weight: 900; font-size: 1.15rem; color: var(--primary-gold); }

.menu-btn { font-size: 1.4rem; background: none; border: none; color: var(--primary-gold); cursor: pointer; }

/* custom top selector (now a dropdown toggle) */
.top-select {
    background: #fff;
    padding: 8px 12px;
    border-radius: 12px;
    border: 1.2px solid var(--light-gold);
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--dark-gold);
    outline: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    position: relative;
}

/* dropdown */
.zikr-dropdown {
    position: absolute;
    top: calc(100% + 10px);
    right: 0;
    width: 260px;
    max-width: calc(100vw - 40px);
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.12);
    padding: 8px;
    transform-origin: top right;
    transform: translateY(-10px) scale(0.98);
    opacity: 0;
    pointer-events: none;
    transition: transform .22s cubic-bezier(.2,.9,.2,1), opacity .18s;
    z-index: 120;
    overflow: hidden;
}

.zikr-dropdown.open { transform: translateY(0) scale(1); opacity: 1; pointer-events: auto; }

.zikr-item {
    padding: 10px 12px;
    border-radius: 10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    cursor: pointer;
    transition: background .12s;
}

.zikr-item + .zikr-item { margin-top: 6px; }

.zikr-item:hover { background: linear-gradient(90deg, rgba(197,160,89,0.06), rgba(74,144,226,0.02)); }

.zikr-item.selected { background: linear-gradient(90deg, rgba(197,160,89,0.14), rgba(197,160,89,0.04)); }

.zikr-count {
    background: var(--light-gold);
    color: var(--dark-gold);
    padding: 6px 8px;
    border-radius: 999px;
    font-weight:700;
    font-size:0.85rem;
    min-width: 42px;
    text-align:center;
}

/* MAIN */
.main-container {
    flex: 1; /* بياخد كل المساحة المتاحة */
    display: flex;
    flex-direction: column;
    justify-content: center; /* بيخلي العداد في نص الشاشة بالظبط */
    align-items: center;
    padding: 20px;
}

.zikr-card { 
    width: 100%; 
    margin-bottom: 50px; /* دي المسافة اللي بين الكلمة وبين العداد */
    text-align: center; 
}
.zikr-card h2 { font-size: 1.6rem; font-weight: 800; color: var(--dark-gold); min-height: 6rem; }

/* COUNTER */
.counter-wrapper { 
    margin-bottom: 20px; /* قللنا المسافة اللي تحت العداد عشان ندي مساحة لفوق */
}
.counter-circle {
    width: 240px; height: 240px; background: white; border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; border: 12px solid var(--primary-gold);
    box-shadow: var(--shadow), inset 0 0 20px rgba(0,0,0,0.04);
    cursor: pointer; transition: transform 0.12s cubic-bezier(.2,.9,.2,1);
}

.counter-circle:active { transform: scale(0.95); }

.counter-circle::after {
    content: '';
    position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
    border-radius: 50%; border: 1px solid var(--light-gold);
}

#counter { font-size: 4.5rem; font-weight: 900; color: var(--primary-gold); line-height: 1; }

.counter-label { color:#999; font-size:0.95rem; font-weight:600; margin-top:6px; }

/* SMALLER ACTION BUTTONS */
.actions { 
    display: flex; 
    gap: 15px; 
    width: 100%; 
    justify-content: center; 
    margin-top: 30px; /* مسافة متوسطة ومريحة للعين */
    padding-bottom: 20px; /* عشان متبقاش لازقة في شريط الموبايل من تحت */
}
.btn-sm {
    padding:8px 20px; border-radius:50px; border:none; font-weight:700; font-size:0.85rem;
    cursor:pointer; display:flex; align-items:center; gap:6px; transition:0.2s; box-shadow:0 6px 16px rgba(0,0,0,0.05);
}

.btn-undo { background:#f0f3f7; color:var(--accent-blue); }
.btn-reset { background:#fff0f0; color:var(--accent-red); }
.btn-sm:active { transform: translateY(2px); }

/* SIDEBAR */
.sidebar {
    position: fixed; top: 0; right: -100%; width: 85%; max-width: 300px; height: 100%;
    background: white; z-index: 1100; transition: 0.3s ease-in-out; display:flex; flex-direction:column;
    box-shadow: -10px 0 30px rgba(0,0,0,0.1);
}

.sidebar.active { right:0; }

.sidebar-header { background:var(--primary-gold); padding:40px 20px; color:white; text-align:center; }

.sidebar-content { padding:20px; overflow-y:auto; }

.section-title { color:#aaa; font-size:.75rem; font-weight:800; text-transform:uppercase; margin:15px 0 10px; letter-spacing:1px; }

.menu-card {
    padding:12px; border-radius:12px; display:flex; align-items:center; justify-content:space-between;
    margin-bottom:8px; cursor:pointer; transition: 0.15s; background:#fcfcfc;
}

.menu-card:hover { background: var(--light-gold); }

.icon-box { width:35px; height:35px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:white; margin-left:12px; font-size:1rem; }

/* QURAN SECTION */
.quran-container {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fdfdfd;
    z-index: 2000; overflow-y: auto;
}

.quran-header-bar {
    background: #fff; padding: 10px 15px; position: sticky; top: 0; display:flex; align-items:center; border-bottom:1px solid #eee; z-index: 10;
}

.surah-card-item {
    background: white; padding: 12px; border-radius: 12px; display:flex; align-items:center; margin-bottom:10px; border:1px solid #f0f0f0;
}

.surah-num-box {
    width:35px; height:35px; background: var(--light-gold); color: var(--dark-gold); border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:700; margin-left:12px; font-size:0.9rem;
}

.surah-view { display:none; padding:20px; background:#fff; }

.ayah-text {
    font-family: 'Amiri', serif;
    font-size: 1.45rem;
    line-height: 2.4;
    text-align: justify;
    direction: rtl;
    padding: 20px;
    background: #fefcf6;
    border-radius: 15px;
    border: 1px solid #f1ece0;
}

/* overlay */
.overlay-bg {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.35);
    display: none; z-index: 1000; backdrop-filter: blur(3px);
}

/* small animation */
@keyframes tap { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
.pop { animation: tap 0.12s ease; }

/* Responsive tweaks */
@media (max-width:420px) {
    #counter { font-size: 3.6rem; }
    .counter-circle { width: 200px; height:200px; }
    .logo-area { font-size:1rem; }
}
</style>
</head>

<body>

<div class="overlay-bg" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div style="font-size:2.5rem;margin-bottom:10px">✨</div>
        <h3>تسابيحاتي</h3>
        <p style="font-size:0.8rem; opacity: 0.95;">بذكر الله تطمئن القلوب</p>
    </div>

    <div class="sidebar-content">
        <div class="section-title">الأقسام</div>
        <div class="menu-card" onclick="openQuran()">
            <div style="display:flex;align-items:center">
                <div class="icon-box" style="background:#8e44ad">📖</div>
                <span style="font-size:0.95rem; font-weight:700">القرآن الكريم</span>
            </div>
            <span style="color:#ccc; font-size:0.8rem">❮</span>
        </div>

        <div class="menu-card" onclick="toggleMenu()">
            <div style="display:flex;align-items:center">
                <div class="icon-box" style="background:#27ae60">📿</div>
                <span style="font-size:0.95rem; font-weight:700">المسبحة الذكية</span>
            </div>
            <span style="color:#ccc; font-size:0.8rem">❮</span>
        </div>

        <div class="menu-card">
            <div style="display:flex;align-items:center">
                <div class="icon-box" style="background:#2980b9">🕌</div>
                <span style="font-size:0.95rem; font-weight:700">مواقيت الصلاة</span>
            </div>
            <span style="color:#ccc; font-size:0.8rem">❮</span>
        </div>

        <div class="section-title">الإعدادات</div>
        <div class="menu-card"><div style="display:flex;align-items:center"><div class="icon-box" style="background:#e67e22">☕</div><span style="font-size:0.9rem">دعم المطور</span></div></div>
    </div>
</div>

<header>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <div class="logo-area">تسابيحاتي</div>

    <!-- custom dropdown selector -->
    <div style="position:relative; margin-left:10px;">
        <div id="zikrToggle" class="top-select" onclick="toggleZikrDropdown()" aria-haspopup="true" aria-expanded="false">
            <span id="zikrLabel">سبحان الله</span>
            <span id="chev" style="font-size:0.85rem; color:var(--dark-gold)">▾</span>
        </div>

        <div id="zikrDropdown" class="zikr-dropdown" role="menu" aria-label="قائمة التسبيحات">
            <!-- items populated by JS -->
        </div>
    </div>
</header>

<div class="main-container">
    <div class="zikr-card">
        <h2 id="currentZikr">سبحان الله</h2>
    </div>

    <div class="counter-wrapper">
        <div class="counter-circle" onclick="increment()" id="circle" aria-label="عداد التسبيحات">
            <span id="counter">0</span>
            <span class="counter-label">تسبيحة</span>
        </div>
    </div>

    <div class="actions">
        <button class="btn-sm btn-undo" onclick="decrement()">↩ تراجع</button>
        <button class="btn-sm btn-reset" onclick="resetCounter()">↻ تصفير</button>
    </div>
</div>

<div id="quranContainer" class="quran-container" aria-hidden="true">
    <div class="quran-header-bar">
         <!-- this button changes behavior dynamically -->
         <button class="menu-btn" id="quranHeaderBtn" onclick="closeQuran()" style="margin-left:15px">✕</button>
         <h3 id="quranTitle" style="flex:1; font-size: 1rem; color: var(--dark-gold); text-align:center;">المصحف الكريم</h3>
    </div>
    
    <div class="search-wrapper" style="padding:15px">
        <input type="text" id="quranSearch" class="top-select" style="width:100%; height:45px; padding:0 15px;" placeholder="ابحث عن سورة..." oninput="filterSurahs()">
    </div>

    <div id="surahList" class="surah-list" style="padding: 0 15px 20px;">
        <p style="text-align:center; padding:20px; color:#999;">جاري تحميل السور...</p>
    </div>

    <div id="surahView" class="surah-view">
        <div id="ayahsContent" class="ayah-text"></div>
        <button class="btn-sm btn-undo" style="margin: 30px auto; width: fit-content;" onclick="showSurahListUI()">العودة للفهرس</button>
    </div>
</div>

<script>
/* ========== Data & Storage ========== */
let allCounts = JSON.parse(localStorage.getItem('allCounts')) || {};
let savedZikr = localStorage.getItem("selectedZikr") || "سبحان الله";
const zikrList = ['سبحان الله','الحمد لله','الله أكبر','أستغفر الله','لا إله إلا الله','اللهم صلِ على محمد'];

/* ========== Elements ========== */
const counterText = document.getElementById('counter');
const currentZikrTitle = document.getElementById('currentZikr');
const circle = document.getElementById("circle");

const zikrToggle = document.getElementById('zikrToggle');
const zikrLabel = document.getElementById('zikrLabel');
const zikrDropdown = document.getElementById('zikrDropdown');

const overlay = document.getElementById('overlay');

/* ====== Init ====== */
function init() {
    if (!allCounts) allCounts = {};
    if (!savedZikr) savedZikr = 'سبحان الله';
    renderZikrDropdown();
    updateUI();
    // close dropdown when clicking outside
    document.addEventListener('click', (e) => {
        if (!zikrToggle.contains(e.target) && !zikrDropdown.contains(e.target)) {
            closeZikrDropdown();
        }
    });
    // close dropdown on scroll for better UX
    window.addEventListener('scroll', () => { closeZikrDropdown(); }, { passive: true });
}

function updateUI(){
    let selectedZikr = savedZikr;
    currentZikrTitle.innerText = selectedZikr;
    zikrLabel.innerText = selectedZikr;
    let currentCount = allCounts[selectedZikr] || 0;
    counterText.innerText = currentCount;
    // persist
    localStorage.setItem('allCounts', JSON.stringify(allCounts));
    localStorage.setItem('selectedZikr', selectedZikr);
    // update dropdown visuals
    updateDropdownCounts();
}

/* ========== Dropdown (sliding) ========== */
function renderZikrDropdown(){
    zikrDropdown.innerHTML = '';
    zikrList.forEach(z => {
        const item = document.createElement('div');
        item.className = 'zikr-item';
        item.setAttribute('role','menuitem');
        item.innerHTML = `<div style="font-weight:700">${z}</div><div class="zikr-count" id="count-${escapeId(z)}">${allCounts[z] || 0}</div>`;
        item.onclick = () => selectZikr(z);
        zikrDropdown.appendChild(item);
    });
    markSelectedInDropdown();
}

function updateDropdownCounts(){
    zikrList.forEach(z => {
        const el = document.getElementById('count-' + escapeId(z));
        if (el) el.innerText = allCounts[z] || 0;
    });
    markSelectedInDropdown();
}

function markSelectedInDropdown(){
    const items = zikrDropdown.querySelectorAll('.zikr-item');
    items.forEach(it => it.classList.remove('selected'));
    // find and mark
    items.forEach(it => {
        if (it.firstElementChild && it.firstElementChild.innerText === savedZikr) {
            it.classList.add('selected');
        }
    });
}

function toggleZikrDropdown(){
    const open = zikrDropdown.classList.toggle('open');
    zikrToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    document.getElementById('chev').innerText = open ? '▴' : '▾';
}

function closeZikrDropdown(){
    if (zikrDropdown.classList.contains('open')) {
        zikrDropdown.classList.remove('open');
        zikrToggle.setAttribute('aria-expanded','false');
        document.getElementById('chev').innerText = '▾';
    }
}

function selectZikr(value){
    savedZikr = value;
    updateUI();
    closeZikrDropdown();
}

/* helper to make id-safe */
function escapeId(s) {
    return s.replace(/[^a-z0-9]/gi, '-');
}

/* ========== Counter actions ========== */
function increment(){
    let selectedZikr = savedZikr;
    allCounts[selectedZikr] = (allCounts[selectedZikr] || 0) + 1;
    circle.classList.add("pop");
    setTimeout(() => circle.classList.remove("pop"), 120);
    if(navigator.vibrate) navigator.vibrate(30);
    updateUI();
}

function decrement(){
    let selectedZikr = savedZikr;
    if(allCounts[selectedZikr] > 0){
        allCounts[selectedZikr]--;
        updateUI();
    }
}

function resetCounter(){
    if(confirm(`هل تريد تصفير عداد "${savedZikr}"؟`)){
        allCounts[savedZikr] = 0;
        updateUI();
    }
}

/* ========== Sidebar ========== */
function toggleMenu(){
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('active');
    overlay.style.display = sidebar.classList.contains('active') ? 'block' : 'none';
    // close any open dropdown for cleanliness
    closeZikrDropdown();
}

/* ========== QURAN / Surah logic (with smart header button) ========= */
const quranContainer = document.getElementById('quranContainer');
const surahListDiv = document.getElementById('surahList');
const surahViewDiv = document.getElementById('surahView');
const quranTitle = document.getElementById('quranTitle');
const quranHeaderBtn = document.getElementById('quranHeaderBtn');
let allSurahs = [];

async function openQuran() {
    toggleMenu(); // close sidebar
    quranContainer.style.display = 'block';
    quranContainer.setAttribute('aria-hidden', 'false');
    // ensure header shows close behavior (closing the quran section)
    setQuranHeaderToClose();
    if(allSurahs.length === 0) await fetchSurahs();
}

function closeQuran() {
    quranContainer.style.display = 'none';
    quranContainer.setAttribute('aria-hidden','true');
    showSurahListUI(); // reset to list for next open
}

/* header button behaviors */
function setQuranHeaderToBack(){
    quranHeaderBtn.innerText = '←';
    quranHeaderBtn.onclick = showSurahListUI;
    quranHeaderBtn.setAttribute('aria-label','العودة للفهرس');
}

function setQuranHeaderToClose(){
    quranHeaderBtn.innerText = '✕';
    quranHeaderBtn.onclick = closeQuran;
    quranHeaderBtn.setAttribute('aria-label','إغلاق المصحف');
}

async function fetchSurahs() {
    try {
        const response = await fetch('https://api.alquran.cloud/v1/surah');
        const data = await response.json();
        allSurahs = data.data;
        renderSurahs(allSurahs);
    } catch (e) {
        surahListDiv.innerHTML = '<p style="text-align:center; padding:20px; color:#d9534f;">حدث خطأ في الاتصال</p>';
    }
}

function renderSurahs(list) {
    surahListDiv.innerHTML = '';
    list.forEach(surah => {
        const card = document.createElement('div');
        card.className = 'surah-card-item';
        card.innerHTML = `
            <div class="surah-num-box">${surah.number}</div>
            <div style="flex:1">
                <div style="font-weight:700; font-size:0.95rem">${surah.name}</div>
                <div style="font-size:0.75rem; color:#888">${surah.numberOfAyahs} آية - ${surah.revelationType === 'Meccan' ? 'مكية' : 'مدنية'}</div>
            </div>
            <span style="color:#ddd">❮</span>
        `;
        card.onclick = () => loadSurah(surah.number, surah.name);
        surahListDiv.appendChild(card);
    });
}

function filterSurahs() {
    const term = document.getElementById('quranSearch').value.trim();
    if (!term) { renderSurahs(allSurahs); return; }
    const filtered = allSurahs.filter(s => s.name.includes(term) || s.number.toString() === term);
    renderSurahs(filtered);
}

async function loadSurah(id, name) {
    quranTitle.innerText = 'جاري التحميل...';
    // switch UI
    surahListDiv.style.display = 'none';
    surahViewDiv.style.display = 'block';
    document.getElementById('quranSearch').parentElement.style.display = 'none';
    // header back button
    setQuranHeaderToBack();

    try {
        const response = await fetch(`https://api.alquran.cloud/v1/surah/${id}/quran-uthmani`);
        const data = await response.json();
        quranTitle.innerText = name;
        
        let ayahs = data.data.ayahs;
        let fullText = "";

        if (id !== 1 && id !== 9) {
            fullText += '<div style="text-align:center; color:var(--dark-gold); margin-bottom:20px; font-size:1.6rem">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>';
        }

        ayahs.forEach(ayah => {
            let txt = ayah.text;
            if (id !== 1 && ayah.numberInSurah === 1) {
                const basmalaText = "بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ";
                txt = txt.replace(basmalaText, "").trim();
            }
            fullText += `${txt} <span style="color:var(--primary-gold); font-family:Cairo; font-size:1rem; font-weight:700"> ﴿${ayah.numberInSurah}﴾ </span> `;
        });
        
        document.getElementById('ayahsContent').innerHTML = fullText;
        quranContainer.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (e) {
        document.getElementById('ayahsContent').innerText = 'حدث خطأ في تحميل السورة.';
    }
}

function showSurahListUI() {
    surahViewDiv.style.display = 'none';
    surahListDiv.style.display = 'block';
    document.getElementById('quranSearch').parentElement.style.display = 'block';
    quranTitle.innerText = 'المصحف الكريم';
    // header gets close behavior again
    setQuranHeaderToClose();
}

/* initialize */
init();
</script>

</body>
</html>
