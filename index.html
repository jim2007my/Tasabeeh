<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>تسابيحاتي - Tasabeehati</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>

:root{
--primary-gold:#c5a059;
--light-gold:#f4e8cf;
--bg-gradient:linear-gradient(180deg,#fdfbf1 0%,#f5efdb 100%);
--white:#ffffff;
--text-dark:#3d3d3d;
--accent-blue:#3498db;
--accent-red:#e74c3c;
--overlay-bg:rgba(0,0,0,0.5);
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Cairo',sans-serif;
-webkit-tap-highlight-color:transparent;
user-select:none;
touch-action:manipulation;
}

body{
background:var(--bg-gradient);
height:100dvh;
display:flex;
flex-direction:column;
overflow:hidden;
color:var(--text-dark);
}

header{
padding:15px 20px;
display:flex;
align-items:center;
justify-content:space-between;
}

.menu-btn{
font-size:1.5rem;
background:none;
border:none;
color:var(--primary-gold);
cursor:pointer;
order:3;
}

.logo-area{
display:flex;
align-items:center;
gap:8px;
font-weight:900;
font-size:1.3rem;
order:2;
}

.top-select{
background:var(--white);
padding:5px 12px;
border-radius:12px;
border:1px solid #eee;
font-size:0.9rem;
font-weight:700;
max-width:180px;
order:1;
outline:none;
}

.main-container{
flex:1;
padding:10px 20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:25px;
}

.zikr-card{
width:100%;
background:rgba(255,255,255,0.5);
backdrop-filter:blur(5px);
border:1px solid rgba(197,160,89,0.2);
padding:20px;
border-radius:25px;
text-align:center;
}

.zikr-card h2{
font-size:1.6rem;
font-weight:900;
min-height:1.2em;
color:var(--primary-gold);
}

.counter-circle{
width:clamp(230px,60vw,300px);
height:clamp(230px,60vw,300px);
background:var(--primary-gold);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:6rem;
font-weight:900;
color:var(--text-dark);
box-shadow:0 15px 35px rgba(197,160,89,0.4);
cursor:pointer;
border:8px solid rgba(255,255,255,0.3);
transition:transform 0.05s;
}

.counter-circle:active{
transform:scale(0.95);
}

.actions{
display:flex;
gap:15px;
width:100%;
justify-content:center;
}

.btn{
flex:1;
max-width:140px;
padding:12px;
border-radius:18px;
border:none;
color:white;
font-weight:700;
cursor:pointer;
font-size:0.95rem;
}

.btn-undo{background:var(--accent-blue);}
.btn-reset{background:var(--accent-red);}

.fab{
position:fixed;
bottom:25px;
left:25px;
background:var(--primary-gold);
color:white;
padding:8px 16px;
border-radius:50px;
font-weight:700;
font-size:0.85rem;
box-shadow:0 8px 15px rgba(197,160,89,0.3);
cursor:pointer;
z-index:99;
display:flex;
align-items:center;
gap:5px;
}

.sidebar{
position:fixed;
top:0;
left:-100%;
width:85%;
max-width:320px;
height:100%;
background:white;
z-index:1100;
transition:0.4s;
display:flex;
flex-direction:column;
}

.sidebar.active{
left:0;
}

.sidebar-header{
background:var(--primary-gold);
padding:40px 20px;
color:white;
text-align:center;
}

.sidebar-content{
padding:20px;
flex:1;
overflow-y:auto;
}

.sidebar-title{
color:#999;
font-size:0.8rem;
font-weight:700;
margin:15px 0 10px;
}

.menu-card{
background:#fdfdfd;
border:1px solid #f0f0f0;
padding:15px;
border-radius:18px;
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:10px;
cursor:pointer;
}

.icon-box{
width:40px;
height:40px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
color:white;
margin-left:12px;
}

.modal-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:var(--overlay-bg);
backdrop-filter:blur(4px);
display:none;
align-items:center;
justify-content:center;
z-index:2000;
padding:20px;
}

.modal-overlay.active{
display:flex;
}

.modal-card{
background:white;
width:100%;
max-width:350px;
border-radius:25px;
padding:25px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.modal-card h3{
margin-bottom:15px;
}

.modal-input{
width:100%;
padding:12px;
border-radius:12px;
border:2px solid var(--light-gold);
font-size:1rem;
outline:none;
margin-bottom:20px;
text-align:center;
}

.modal-btns{
display:flex;
gap:10px;
}

.modal-btns button{
flex:1;
padding:10px;
border-radius:10px;
border:none;
font-weight:700;
cursor:pointer;
}

.confirm-btn{
background:var(--primary-gold);
color:white;
}

.cancel-btn{
background:#eee;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(4px);
display:none;
z-index:1000;
}

</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="modal-overlay" id="customModal">

<div class="modal-card">

<h3 id="modalTitle"></h3>

<div id="inputContainer">
<input type="text" id="modalInput" class="modal-input" placeholder="اكتب هنا...">
</div>

<div class="modal-btns">
<button class="confirm-btn" id="modalConfirmBtn">تأكيد</button>
<button class="cancel-btn" onclick="closeModal()">إلغاء</button>
</div>

</div>
</div>

<div class="sidebar" id="sidebar">

<div class="sidebar-header">
<div style="font-size:2.5rem;margin-bottom:10px;">🌿</div>
<h2>تسابيحاتي</h2>
</div>

<div class="sidebar-content">

<div class="sidebar-title">المحتوى الرئيسي</div>

<div class="menu-card">
<div style="display:flex;align-items:center;">
<div class="icon-box" style="background:#7d5a5a">📖</div>
<span>القرآن الكريم</span>
</div>
<span>❯</span>
</div>

<div class="menu-card">
<div style="display:flex;align-items:center;">
<div class="icon-box" style="background:#55a363">📿</div>
<span>الأذكار</span>
</div>
<span>❯</span>
</div>

<div class="menu-card">
<div style="display:flex;align-items:center;">
<div class="icon-box" style="background:#2a9d8f">🕌</div>
<span>مواقيت الصلاة</span>
</div>
<span>❯</span>
</div>

</div>
</div>

<header>

<select class="top-select" id="zikrSelect" onchange="changeZikr()">
<option value="سبحان الله">سبحان الله</option>
<option value="الحمد لله">الحمد لله</option>
<option value="الله أكبر">الله أكبر</option>
<option value="استغفر الله">استغفر الله</option>
</select>

<div class="logo-area">🌿 تسابيحاتي</div>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

</header>

<div class="main-container">

<div class="zikr-card">
<h2 id="currentZikr">سبحان الله</h2>
</div>

<div class="counter-circle" onclick="increment()">
<span id="counter">0</span>
</div>

<div class="actions">
<button class="btn btn-undo" onclick="decrement()">↩ تراجع</button>
<button class="btn btn-reset" onclick="resetCounter()">↻ إعادة</button>
</div>

</div>

<div class="fab" onclick="promptNewZikr()">
<span style="font-size:1.2rem;">+</span> أضف تسبيحة
</div>

<script>

let allCounts=JSON.parse(localStorage.getItem('allCounts'))||{}
let customZikrs=JSON.parse(localStorage.getItem('customZikrs'))||[]

const counterText=document.getElementById('counter')
const zikrSelect=document.getElementById('zikrSelect')
const currentZikrTitle=document.getElementById('currentZikr')

const customModal=document.getElementById('customModal')
const modalInput=document.getElementById('modalInput')
const modalTitle=document.getElementById('modalTitle')
const modalConfirmBtn=document.getElementById('modalConfirmBtn')

let lastClick=0

function init(){

customZikrs.forEach(z=>{

let opt=document.createElement('option')
opt.value=z
opt.text=z

zikrSelect.add(opt)

})

updateUI()

}

function updateUI(){

let selected=zikrSelect.value

currentZikrTitle.innerText=selected

counterText.innerText=allCounts[selected]||0

}

function changeZikr(){
updateUI()
}

function increment(){

let now=Date.now()

if(now-lastClick<50)return

lastClick=now

let selected=zikrSelect.value

allCounts[selected]=(allCounts[selected]||0)+1

if("vibrate" in navigator)navigator.vibrate(40)

localStorage.setItem('allCounts',JSON.stringify(allCounts))

updateUI()

}

function decrement(){

let selected=zikrSelect.value

if((allCounts[selected]||0)>0){

allCounts[selected]--

localStorage.setItem('allCounts',JSON.stringify(allCounts))

updateUI()

}

}

function resetCounter(){

openModal(`هل تريد تصفير عداد "${zikrSelect.value}"؟`,false,()=>{

allCounts[zikrSelect.value]=0

localStorage.setItem('allCounts',JSON.stringify(allCounts))

updateUI()

})

}

function openModal(title,showInput,onConfirm){

modalTitle.innerText=title

modalInput.value=""

document.getElementById('inputContainer').style.display=showInput?'block':'none'

customModal.classList.add('active')

modalConfirmBtn.onclick=()=>{

onConfirm(modalInput.value)

closeModal()

}

}

function closeModal(){
customModal.classList.remove('active')
}

modalInput.addEventListener("keypress",function(e){

if(e.key==="Enter")modalConfirmBtn.click()

})

function promptNewZikr(){

openModal("إضافة تسبيحة جديدة",true,(val)=>{

if(val&&val.trim()!==""){

let name=val.trim()

if(!customZikrs.includes(name)){

customZikrs.push(name)

localStorage.setItem('customZikrs',JSON.stringify(customZikrs))

let opt=document.createElement('option')

opt.value=name
opt.text=name

zikrSelect.add(opt)

}

zikrSelect.value=name

updateUI()

}

})

}

function toggleMenu(){

const sidebar=document.getElementById('sidebar')
const overlay=document.getElementById('overlay')

sidebar.classList.toggle('active')

overlay.style.display=sidebar.classList.contains('active')?'block':'none'

}

init()

</script>

</body>
</html>
